task:
  name: Build Freeze95 VST3 (macOS)
  alias: macos-vst3

  macos_instance:
    image: ghcr.io/cirruslabs/macos-runner:sequoia

  only_if: changesInclude('Freeze95/**') || changesInclude('.cirrus.yml')

  env:
    BINARY_NAME: Freeze95

  install_script:
    - brew install cmake

  build_script:
    # Clone iPlug2 into Freeze95/
    - git clone --depth 1 --shallow-submodules https://github.com/iPlug2/iPlug2.git Freeze95/iPlug2
    # Download VST3 + CLAP SDKs
    - cd Freeze95/iPlug2/Dependencies/IPlug && bash download-iplug-sdks.sh
    - cd ../../../..
    # Copy Freeze95 sources over IPlugEffect template
    - cd Freeze95
    - cp Freeze95.cpp iPlug2/Examples/IPlugEffect/IPlugEffect.cpp
    - cp Freeze95.h iPlug2/Examples/IPlugEffect/IPlugEffect.h
    - cp Freeze95.h iPlug2/Examples/IPlugEffect/Freeze95.h
    - cp config.h iPlug2/Examples/IPlugEffect/config.h
    - cp Freeze95DSP.h iPlug2/Examples/IPlugEffect/Freeze95DSP.h
    - cp resources/* iPlug2/Examples/IPlugEffect/resources/ 2>/dev/null || true
    # Copy plist files with plugin name
    - cd iPlug2/Examples/IPlugEffect/resources
    - for f in IPlugEffect-*.plist; do [ -f "$f" ] && cp "$f" "Freeze95${f#IPlugEffect}" || true; done
    - cd ../../../../..
    # Write xcconfig override
    - |
      cat > Freeze95/iPlug2/Examples/IPlugEffect/config/IPlugEffect-mac.xcconfig << 'EOF'
      IPLUG2_ROOT = ../../..
      #include "../../../common-mac.xcconfig"
      BINARY_NAME = Freeze95
      EXTRA_INC_PATHS = $(IGRAPHICS_INC_PATHS) $(SRCROOT)/../../../..
      EXTRA_ALL_DEFS = IGRAPHICS_NANOVG IGRAPHICS_METAL
      EXTRA_LNK_FLAGS = -framework Metal -framework MetalKit
      ARCHS = x86_64 arm64
      RELEASE_OPTIMIZE = 3
      MACOSX_DEPLOYMENT_TARGET = 11.0
      CODE_SIGNING_REQUIRED = YES
      CODE_SIGN_IDENTITY = -
      // macOS 15+ ad-hoc cannot embed entitlements - skip hardened runtime
      EOF
    # Build VST3
    - cd Freeze95/iPlug2/Examples/IPlugEffect
    - |
      xcodebuild -project projects/IPlugEffect-macOS.xcodeproj \
        -scheme "macOS-VST3" \
        -configuration Release \
        -arch x86_64 -arch arm64 \
        BUILD_DIR="${CIRRUS_WORKING_DIR}/Freeze95/build-mac" \
        VST3_PATH="${CIRRUS_WORKING_DIR}/Freeze95/build-mac/Products"
    - cd ../../../..
    # Verify bundle exists
    - |
      VST3_BUNDLE="${CIRRUS_WORKING_DIR}/Freeze95/build-mac/Products/Freeze95.vst3"
      echo "=== VST3 Bundle Verification ==="
      if [ -d "$VST3_BUNDLE" ]; then
        echo "Bundle found: $VST3_BUNDLE"
        ls -la "$VST3_BUNDLE/Contents/"
        ls -la "$VST3_BUNDLE/Contents/MacOS/" || echo "MacOS dir missing"
      else
        echo "ERROR: VST3 bundle not found!"
        ls -la "${CIRRUS_WORKING_DIR}/Freeze95/build-mac/Products/" || echo "Products dir missing"
      fi
    # Codesign ad-hoc (macOS 15+ compatible - no hardened runtime)
    - |
      VST3="${CIRRUS_WORKING_DIR}/Freeze95/build-mac/Products/Freeze95.vst3"
      if [ -d "$VST3" ]; then
        BIN="$VST3/Contents/MacOS/Freeze95"
        if [ -f "$BIN" ]; then
          codesign --force -s - "$BIN"
          codesign --force -s - "$VST3"
          echo "Codesign complete"
          codesign -dvv "$VST3" 2>&1
        fi
      fi
    # Create zip artifact
    - |
      cd "${CIRRUS_WORKING_DIR}/Freeze95/build-mac/Products"
      if [ -d "Freeze95.vst3" ]; then
        zip -r Freeze95-macOS-VST3.zip Freeze95.vst3/
        echo "Artifact created: $(pwd)/Freeze95-macOS-VST3.zip"
      fi

  artifacts:
    path: "Freeze95/build-mac/Products/Freeze95-macOS-VST3.zip"
    type: application/zip

  # macOS builds can be slow - 60 min timeout
  timeout_in: 60m
