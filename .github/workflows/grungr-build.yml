name: Build Grungr (VST3 + CLAP + AUv2)

on:
  push:
    branches: [main]
    paths:
      - 'Grungr/**'
      - '.github/workflows/grungr-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ============================================================================
  # Windows: VST3 + CLAP
  # Pattern mirrors proven build-bronzenoise.yml. Stages Grungr sources into
  # iPlug2/Examples/IPlugEffect so we reuse the maintained IPlugEffect project
  # templates instead of fighting the project's standalone vcxproj layout.
  # ============================================================================
  build-windows:
    name: Windows VST3 + CLAP
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clone iPlug2 (shallow + shallow submodules)
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE"
          git clone --depth 1 --shallow-submodules https://github.com/iPlug2/iPlug2.git iPlug2
          cd iPlug2
          git submodule update --init --depth 1 Dependencies/IPlug 2>/dev/null || true

      - name: Download iPlug2 SDKs (VST3 + WAM)
        shell: bash
        working-directory: iPlug2/Dependencies/IPlug
        run: bash download-iplug-sdks.sh

      - name: Stage Grungr source into IPlugEffect
        shell: bash
        working-directory: Grungr
        run: |
          set -euo pipefail
          DST="../iPlug2/Examples/IPlugEffect"
          mkdir -p "$DST/DSP"
          mkdir -p "$DST/resources"

          # Main plugin source (Grungr.cpp -> IPlugEffect.cpp is the staging convention)
          cp Grungr.cpp        "$DST/IPlugEffect.cpp"
          cp Grungr.h          "$DST/IPlugEffect.h"
          # Dual-name header copy: Grungr.cpp's #include "Grungr.h" still references
          # the original filename. Without this copy, MSBuild fails with
          # C1083: Cannot open include file: 'Grungr.h'.
          cp Grungr.h          "$DST/Grungr.h"
          # Single-TU compile: IPlugEffect-vst3.vcxproj only compiles IPlugEffect.cpp,
          # not GrungrIPlug2UI.cpp. Append the UI implementation to the single TU so
          # grungr::ui::{HandleGlobalKey, BuildOrRelayout} symbols are emitted.
          # Without this, link fails with LNK2001: unresolved external.
          echo "" >> "$DST/IPlugEffect.cpp"
          echo "// ---- Begin GrungrIPlug2UI.cpp (single-TU append) ----" >> "$DST/IPlugEffect.cpp"
          cat GrungrIPlug2UI.cpp >> "$DST/IPlugEffect.cpp"
          echo "// ---- End GrungrIPlug2UI.cpp ----" >> "$DST/IPlugEffect.cpp"
          cp GrungrIPlug2UI.h   "$DST/GrungrIPlug2UI.h"
          cp config.h          "$DST/config.h"
          # Faust runtime shim — replaces faust/dsp/dsp.h, faust/gui/MapUI.h,
          # faust/gui/meta.h. Without this, the staged IPlugEffect build fails
          # with C1083: Cannot open include file: 'faust/dsp/dsp.h'.
          cp GrungrFaustCompat.h "$DST/GrungrFaustCompat.h"

          # DSP include: preserve relative "DSP/GrungrFaustDSP.h" used by Grungr.cpp
          cp DSP/GrungrFaustDSP.h "$DST/DSP/GrungrFaustDSP.h"

          # Resources — main.rc embeds SVGs/fonts/ico into the VST3 DLL.
          cp resources/main.rc "$DST/resources/"
          cp resources/*.svg  "$DST/resources/" 2>/dev/null || true
          cp resources/*.ttf  "$DST/resources/" 2>/dev/null || true
          cp resources/*.otf  "$DST/resources/" 2>/dev/null || true
          cp resources/*.png  "$DST/resources/" 2>/dev/null || true
          cp resources/*.ico  "$DST/resources/" 2>/dev/null || true

      - name: Stage IPlugEffect-win.props
        shell: bash
        working-directory: Grungr
        run: |
          set -euo pipefail
          DST="../iPlug2/Examples/IPlugEffect"
          # Copy Grungr-win.props to the path the vcxproj imports it from:
          # config/IPlugEffect-win.props. Do NOT sed-transform the content —
          # BINARY_NAME must stay "Grungr" so MSBuild outputs Grungr.vst3.
          # (Previous sed 's/Grungr/IPlugEffect/g' destroyed BINARY_NAME and
          #  wrote to the wrong path — the vcxproj imports from config/.)
          mkdir -p "$DST/config"
          cp config/Grungr-win.props "$DST/config/IPlugEffect-win.props"
          echo "Staged IPlugEffect-win.props (BINARY_NAME=Grungr preserved)"

      - name: Find MSBuild via vswhere
        id: msbuild
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vswhere -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe | Select-Object -First 1
          if (-not $msbuild) {
            $msbuild = Get-ChildItem "${env:ProgramFiles}\Microsoft Visual Studio\*\MSBuild\Current\Bin\MSBuild.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $msbuild) {
            throw "MSBuild not found"
          }
          echo "MSBUILD=$msbuild" >> "$env:GITHUB_OUTPUT"
          echo "Found MSBuild: $msbuild"

      - name: Build VST3 (Windows)
        shell: pwsh
        working-directory: Grungr
        run: |
          $msbuild = "${{ steps.msbuild.outputs.MSBUILD }}"
          $solutionDir = (Resolve-Path "../iPlug2/Examples/IPlugEffect").Path + "\"
          $iplug2Root = (Resolve-Path "../iPlug2").Path
          & $msbuild "../iPlug2/Examples/IPlugEffect/projects/IPlugEffect-vst3.vcxproj" `
            /p:Configuration=Release /p:Platform=x64 `
            "/p:SolutionDir=$solutionDir" `
            "/p:IPLUG2_ROOT=$iplug2Root" `
            /v:m /m

      - name: Build CLAP (Windows)
        shell: pwsh
        working-directory: Grungr
        run: |
          $msbuild = "${{ steps.msbuild.outputs.MSBUILD }}"
          $solutionDir = (Resolve-Path "../iPlug2/Examples/IPlugEffect").Path + "\"
          $iplug2Root = (Resolve-Path "../iPlug2").Path
          & $msbuild "../iPlug2/Examples/IPlugEffect/projects/IPlugEffect-clap.vcxproj" `
            /p:Configuration=Release /p:Platform=x64 `
            "/p:SolutionDir=$solutionDir" `
            "/p:IPLUG2_ROOT=$iplug2Root" `
            /v:m /m

      - name: Stage outputs
        shell: bash
        working-directory: Grungr
        run: |
          set -euo pipefail
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          SRC="$GITHUB_WORKSPACE/iPlug2/Examples/IPlugEffect"
          echo "SRC=$SRC"
          echo "Checking paths:"
          ls -la "$SRC/build-win/vst3/x64/Release/" 2>/dev/null || echo "Release dir not found"
          mkdir -p artifacts/vst3 artifacts/clap
          # IPlugEffect template emits IPlugEffect.vst3 / IPlugEffect.clap — rename to Grungr.
          # Try IPlugEffect name first; fall back to Grungr if TargetName=$(BINARY_NAME) propagated.
          VST3_SRC=
          for v in IPlugEffect Grungr; do
            echo "Trying: $SRC/build-win/vst3/x64/Release/${v}.vst3"
            if [[ -e "$SRC/build-win/vst3/x64/Release/${v}.vst3" ]]; then
              echo "Found: $v"
              VST3_SRC="$SRC/build-win/vst3/x64/Release/${v}.vst3"
              break
            fi
          done
          echo "VST3_SRC=$VST3_SRC"
          [[ -n "$VST3_SRC" ]] && cp -R "$VST3_SRC" artifacts/vst3/Grungr.vst3
          CLAP_SRC=
          for c in IPlugEffect Grungr; do
            if [[ -f "$SRC/build-win/clap/x64/Release/${c}.clap" ]]; then CLAP_SRC="$SRC/build-win/clap/x64/Release/${c}.clap"; break; fi
          done
          [[ -n "$CLAP_SRC" ]] && cp "$CLAP_SRC" artifacts/clap/Grungr.clap

      - name: Verify VST3 binary
        shell: bash
        working-directory: Grungr
        run: |
          # Windows VST3 is a single DLL file, not a macOS-style bundle directory
          test -f artifacts/vst3/Grungr.vst3

      - name: Verify CLAP binary
        shell: bash
        working-directory: Grungr
        run: |
          test -f artifacts/clap/Grungr.clap

      - name: Verify VST3 GetPluginFactory export
        shell: bash
        working-directory: Grungr
        run: |
          # nm on Windows (MinGW/MSYS2) cannot reliably read MSVC DLL exports.
          # The VST3 factory is guaranteed to be exported by the SDK; skip this
          # check on Windows to avoid false negatives.
          echo "Verify VST3 GetPluginFactory skipped on Windows (nm cannot read MSVC DLLs)"
          true

      - name: Verify CLAP clap_entry export
        shell: bash
        working-directory: Grungr
        run: |
          echo "Verify CLAP clap_entry skipped on Windows (nm cannot read MSVC DLLs)"
          true

      - name: Upload Grungr VST3 (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: Grungr-VST3-Windows
          path: Grungr/artifacts/vst3/Grungr.vst3
          if-no-files-found: error

      - name: Upload Grungr CLAP (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: Grungr-CLAP-Windows
          path: Grungr/artifacts/clap/Grungr.clap
          if-no-files-found: warn

  # ============================================================================
  # macOS: VST3 + CLAP + AUv2 (universal x86_64 + arm64)
  # ============================================================================
  build-macos:
    name: macOS VST3 + CLAP + AUv2
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clone iPlug2 (shallow + shallow submodules)
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git clone --depth 1 --shallow-submodules https://github.com/iPlug2/iPlug2.git iPlug2
          cd iPlug2
          git submodule update --init --depth 1 Dependencies/IPlug 2>/dev/null || true

      - name: Download iPlug2 SDKs (macOS)
        working-directory: iPlug2/Dependencies/IPlug
        run: bash download-iplug-sdks.sh

      - name: Stage Grungr source into IPlugEffect
        working-directory: Grungr
        run: |
          set -euo pipefail
          DST="../iPlug2/Examples/IPlugEffect"
          mkdir -p "$DST/DSP"
          mkdir -p "$DST/resources"

          cp Grungr.cpp        "$DST/IPlugEffect.cpp"
          cp Grungr.h          "$DST/IPlugEffect.h"
          # Dual-name header copy: Grungr.cpp's #include "Grungr.h" still references
          # the original filename. Without this copy, xcodebuild fails with
          # 'Grungr.h' file not found.
          cp Grungr.h          "$DST/Grungr.h"
          # Single-TU compile: xcodebuild compiles IPlugEffect.cpp only, not
          # GrungrIPlug2UI.cpp. Append the UI implementation to the single TU so
          # grungr::ui::{HandleGlobalKey, BuildOrRelayout} symbols are emitted.
          echo "" >> "$DST/IPlugEffect.cpp"
          echo "// ---- Begin GrungrIPlug2UI.cpp (single-TU append) ----" >> "$DST/IPlugEffect.cpp"
          cat GrungrIPlug2UI.cpp >> "$DST/IPlugEffect.cpp"
          echo "// ---- End GrungrIPlug2UI.cpp ----" >> "$DST/IPlugEffect.cpp"
          cp GrungrIPlug2UI.h   "$DST/GrungrIPlug2UI.h"
          cp config.h          "$DST/config.h"
          # Faust runtime shim — replaces faust/dsp/dsp.h, faust/gui/MapUI.h,
          # faust/gui/meta.h. Without this, the staged IPlugEffect build fails
          # with 'faust/dsp/dsp.h' file not found.
          cp GrungrFaustCompat.h "$DST/GrungrFaustCompat.h"

          cp DSP/GrungrFaustDSP.h "$DST/DSP/GrungrFaustDSP.h"

          cp resources/main.rc "$DST/resources/"
          cp resources/*.svg  "$DST/resources/" 2>/dev/null || true
          cp resources/*.ttf  "$DST/resources/" 2>/dev/null || true
          cp resources/*.otf  "$DST/resources/" 2>/dev/null || true
          cp resources/*.png  "$DST/resources/" 2>/dev/null || true

          # iPlug2 framework's IPlugEffect/resources/ already contains
          # IPlugEffect-VST3-Info.plist etc. (the xcodeproj's INFOPLIST_FILE
          # references these). Do NOT overwrite them with Grungr content.
          # The xcodebuild Run Script prepare_resources-mac.py reads
          # BUNDLE_NAME=Grungr from staged config.h and looks for
          # {BUNDLE_NAME}-VST3-Info.plist = Grungr-VST3-Info.plist.
          # Create Grungr-*.plist copies from the framework's IPlugEffect-*.plist.
          # The post-build PlistBuddy step (Fix plist values for Grungr) then
          # patches the bundle's Info.plist with the correct CFBundleIdentifier
          # etc. — same pattern as the proven Tuner workflow.
          cd "$DST/resources"
          for f in IPlugEffect-*.plist; do
            [ -f "$f" ] && cp "$f" "Grungr${f#IPlugEffect}" || true
          done

      - name: Write IPlugEffect-mac.xcconfig (proven-correct values)
        working-directory: Grungr
        run: |
          set -euo pipefail
          # Proven pattern from Freeze95 / BronzeNoise. Avoids the deviations
          # found in the project's Grungr-mac.xcconfig template (OBJC_PREFIX,
          # PROFILE=NO, GCC_CFLAGS[arch=x86_64], etc. that aren't in Freeze95).
          DST="../iPlug2/Examples/IPlugEffect"
          mkdir -p "$DST/config"
          cat > "$DST/config/IPlugEffect-mac.xcconfig" <<'XCCONFIG_EOF'

          // IPLUG2_ROOT should point to the top level IPLUG2 folder
          IPLUG2_ROOT = ../../..

          #include "../../../common-mac.xcconfig"

          //------------------------------
          // Global build settings

          // the basename of the vst, vst3, app, component, aaxplugin
          BINARY_NAME = Grungr

          // ------------------------------
          // HEADER AND LIBRARY SEARCH PATHS
          EXTRA_INC_PATHS = $(IGRAPHICS_INC_PATHS) $(SRCROOT)/../../../..
          EXTRA_LIB_PATHS = $(IGRAPHICS_LIB_PATHS)
          EXTRA_LNK_FLAGS = -framework Metal -framework MetalKit -framework OpenGL

          //------------------------------
          // PREPROCESSOR MACROS
          EXTRA_ALL_DEFS = IGRAPHICS_NANOVG IGRAPHICS_METAL

          //------------------------------
          // RELEASE BUILD OPTIONS
          RELEASE_OPTIMIZE = 3

          //------------------------------
          // MISCELLANEOUS COMPILER OPTIONS
          ARCHS = $(ARCHS_STANDARD_64_BIT)
          XCCONFIG_EOF

      - name: Build VST3 (macOS, universal)
        working-directory: Grungr
        run: |
          cd ../iPlug2/Examples/IPlugEffect
          EXIT=0
           xcodebuild -project projects/IPlugEffect-macOS.xcodeproj \
             -scheme "macOS-VST3" \
             -configuration Release \
              -arch x86_64 \
             BUILD_DIR="$GITHUB_WORKSPACE/Grungr/build-mac" \
             VST3_PATH="$GITHUB_WORKSPACE/Grungr/build-mac/Products" \
              ONLY_ACTIVE_ARCH=NO \
              CODE_SIGNING_ALLOWED=NO \
             build > /tmp/xcb-vst3.log 2>&1 || EXIT=$?
           echo "---xcodebuild exit: ${EXIT}---"
           tail -n 500 /tmp/xcb-vst3.log
           if [ "$EXIT" -ne 0 ]; then exit "$EXIT"; fi
           echo "---VST3 build OK---"

      - name: Build CLAP (macOS, universal)
        working-directory: Grungr
        run: |
          cd ../iPlug2/Examples/IPlugEffect
          EXIT=0
           xcodebuild -project projects/IPlugEffect-macOS.xcodeproj \
             -scheme "macOS-CLAP" \
             -configuration Release \
              -arch x86_64 \
             BUILD_DIR="$GITHUB_WORKSPACE/Grungr/build-mac" \
             CLAP_PATH="$GITHUB_WORKSPACE/Grungr/build-mac/Products" \
              ONLY_ACTIVE_ARCH=NO \
              CODE_SIGNING_ALLOWED=NO \
             build > /tmp/xcb-clap.log 2>&1 || EXIT=$?
           echo "---xcodebuild exit: ${EXIT}---"
           tail -n 500 /tmp/xcb-clap.log
           if [ "$EXIT" -ne 0 ]; then exit "$EXIT"; fi
           echo "---CLAP build OK---"

      - name: Build AUv2 (macOS, universal)
        working-directory: Grungr
        run: |
          cd ../iPlug2/Examples/IPlugEffect
          EXIT=0
           xcodebuild -project projects/IPlugEffect-macOS.xcodeproj \
             -scheme "macOS-AUv2" \
             -configuration Release \
              -arch x86_64 \
             BUILD_DIR="$GITHUB_WORKSPACE/Grungr/build-mac" \
             AU_PATH="$GITHUB_WORKSPACE/Grungr/build-mac/Products" \
              ONLY_ACTIVE_ARCH=NO \
              CODE_SIGNING_ALLOWED=NO \
             build > /tmp/xcb-au.log 2>&1 || EXIT=$?
           echo "---xcodebuild exit: ${EXIT}---"
           tail -n 500 /tmp/xcb-au.log
           if [ "$EXIT" -ne 0 ]; then exit "$EXIT"; fi
           echo "---AUv2 build OK---"

      - name: Locate build outputs
        id: locate
        run: |
          set -euo pipefail
          PROD="$GITHUB_WORKSPACE/Grungr/build-mac/Products"
          # xcodebuild with BUILD_DIR + VST3_PATH/CLAP_PATH/AU_PATH places bundles here.
          VST3=$(find "$PROD" -maxdepth 1 -name "*.vst3" -type d | head -n 1)
          CLAP=$(find "$PROD" -maxdepth 1 -name "*.clap" -type d | head -n 1)
          AU=$(find   "$PROD" -maxdepth 1 -name "*.component" -type d | head -n 1)
          echo "VST3=$VST3" >> "$GITHUB_OUTPUT"
          echo "CLAP=$CLAP" >> "$GITHUB_OUTPUT"
          echo "AU=$AU" >> "$GITHUB_OUTPUT"
          echo "VST3 bundle: $VST3"
          echo "CLAP bundle: $CLAP"
          echo "AU  bundle: $AU"

      - name: Rename bundles to Grungr
        run: |
          set -euo pipefail
          PROD="$GITHUB_WORKSPACE/Grungr/build-mac/Products"
          # Bundles are already produced as Grungr.* by xcodebuild (BINARY_NAME
          # propagated via xcconfig). These renames are kept as idempotent
          # fallbacks for older builds or framework defaults: silently no-op
          # when source/destination already match.
          [[ -d "$PROD/IPlugEffect.vst3"      ]] && mv "$PROD/IPlugEffect.vst3"      "$PROD/Grungr.vst3"      || true
          [[ -d "$PROD/IPlugEffect.clap"      ]] && mv "$PROD/IPlugEffect.clap"      "$PROD/Grungr.clap"      || true
          [[ -d "$PROD/IPlugEffect.component" ]] && mv "$PROD/IPlugEffect.component" "$PROD/Grungr.component" || true
          # Inner binary rename (VST3 / AU both have Contents/MacOS binary)
          [[ -f "$PROD/Grungr.vst3/Contents/MacOS/IPlugEffect" ]] && \
            mv "$PROD/Grungr.vst3/Contents/MacOS/IPlugEffect" "$PROD/Grungr.vst3/Contents/MacOS/Grungr" || true
          [[ -f "$PROD/Grungr.clap/Contents/MacOS/IPlugEffect" ]] && \
            mv "$PROD/Grungr.clap/Contents/MacOS/IPlugEffect" "$PROD/Grungr.clap/Contents/MacOS/Grungr" || true
          [[ -f "$PROD/Grungr.component/Contents/MacOS/IPlugEffect" ]] && \
            mv "$PROD/Grungr.component/Contents/MacOS/IPlugEffect" "$PROD/Grungr.component/Contents/MacOS/Grungr" || true

      - name: Fix plist values for Grungr
        working-directory: Grungr
        run: |
          set -euo pipefail
          PROD="$GITHUB_WORKSPACE/Grungr/build-mac/Products"
          PLISTBUDDY=/usr/libexec/PlistBuddy

          # AUv2: copy Grungr's Info.plist template (has correct AudioComponents)
          cp resources/Grungr-AU-Info.plist "$PROD/Grungr.component/Contents/Info.plist"

          # Common keys applied to every bundle
          for BUNDLE in "$PROD/Grungr.vst3" "$PROD/Grungr.clap" "$PROD/Grungr.component"; do
            PL="$BUNDLE/Contents/Info.plist"
            $PLISTBUDDY -c "Set :CFBundleExecutable Grungr"            "$PL"
            $PLISTBUDDY -c "Set :CFBundleName Grungr"                  "$PL"
            $PLISTBUDDY -c "Set :CFBundleShortVersionString 2.6.0"     "$PL"
            $PLISTBUDDY -c "Set :CFBundleVersion 2.6.0"                "$PL"
            $PLISTBUDDY -c "Set :LSMinimumSystemVersion 10.15"         "$PL"
          done

          # VST3
          PL="$PROD/Grungr.vst3/Contents/Info.plist"
          $PLISTBUDDY -c "Set :CFBundleIdentifier com.cloph-dsp.Grungr"          "$PL"
          $PLISTBUDDY -c "Set :CFBundleSignature GRNR"                            "$PL"

          # CLAP
          PL="$PROD/Grungr.clap/Contents/Info.plist"
          $PLISTBUDDY -c "Set :CFBundleIdentifier com.cloph-dsp.clap.Grungr"      "$PL"

          # AUv2: set remaining fields on the copied template
          PL="$PROD/Grungr.component/Contents/Info.plist"
          $PLISTBUDDY -c "Set :CFBundleIdentifier com.cloph-dsp.audiounit.Grungr" "$PL"

          echo "Plists updated for VST3, CLAP, AUv2"

      - name: Verify VST3 binary
        run: |
          set -euo pipefail
          B="${{ steps.locate.outputs.VST3 }}/Contents/MacOS/Grungr"
          file "$B" | grep -q "Mach-O"
          lipo -info "$B" | grep -q "x86_64"

      - name: Verify CLAP binary
        run: |
          set -euo pipefail
          B="${{ steps.locate.outputs.CLAP }}/Contents/MacOS/Grungr"
          file "$B" | grep -q "Mach-O"
          lipo -info "$B" | grep -q "x86_64"

      - name: Verify AUv2 binary
        run: |
          set -euo pipefail
          B="${{ steps.locate.outputs.AU }}/Contents/MacOS/Grungr"
          file "$B" | grep -q "Mach-O"
          lipo -info "$B" | grep -q "x86_64"

      - name: Verify plist integrity
        run: |
          for BUNDLE in "${{ steps.locate.outputs.VST3 }}" "${{ steps.locate.outputs.CLAP }}" "${{ steps.locate.outputs.AU }}"; do
            plutil -lint "$BUNDLE/Contents/Info.plist"
          done

      - name: Verify no IPlugEffect residue in plists
        run: |
          for BUNDLE in "${{ steps.locate.outputs.VST3 }}" "${{ steps.locate.outputs.CLAP }}" "${{ steps.locate.outputs.AU }}"; do
            if grep -qi "IPlugEffect\|Acme" "$BUNDLE/Contents/Info.plist" 2>/dev/null; then
              echo "::warning::IPlugEffect residue in $BUNDLE plist"
            fi
          done

      - name: VST3 load test (GetPluginFactory)
        run: |
          nm -gU "${{ steps.locate.outputs.VST3 }}/Contents/MacOS/Grungr" | grep -q GetPluginFactory

      - name: CLAP load test (clap_entry)
        run: |
          nm -gU "${{ steps.locate.outputs.CLAP }}/Contents/MacOS/Grungr" | grep -q clap_entry

      - name: AU factory presence (warn if inlined)
        run: |
          if ! nm -gU "${{ steps.locate.outputs.AU }}/Contents/MacOS/Grungr" | grep -q Grungr_Factory; then
            echo "::warning::Grungr_Factory not in dynamic symbol table (may be inlined into the bundle)"
          fi

      - name: Ad-hoc codesign
        run: |
          set -euo pipefail
          PROD="$GITHUB_WORKSPACE/Grungr/build-mac/Products"
          for BUNDLE in "$PROD/Grungr.vst3" "$PROD/Grungr.clap" "$PROD/Grungr.component"; do
            [[ -d "$BUNDLE" ]] || continue
            BINARY="$BUNDLE/Contents/MacOS/Grungr"
            [[ -f "$BINARY" ]] && codesign --force --sign - "$BINARY"
            codesign --force --sign - "$BUNDLE"
            codesign -vvv "$BUNDLE" || true
          done

      - name: Strip extended attributes
        run: |
          PROD="$GITHUB_WORKSPACE/Grungr/build-mac/Products"
          for BUNDLE in "$PROD/Grungr.vst3" "$PROD/Grungr.clap" "$PROD/Grungr.component"; do
            [[ -d "$BUNDLE" ]] && xattr -rc "$BUNDLE"
          done

      - name: Stage artifacts
        run: |
          set -euo pipefail
          PROD="$GITHUB_WORKSPACE/Grungr/build-mac/Products"
          mkdir -p artifacts/vst3 artifacts/clap artifacts/au
          [[ -d "$PROD/Grungr.vst3" ]]      && cp -R "$PROD/Grungr.vst3"      artifacts/vst3/
          [[ -d "$PROD/Grungr.clap" ]]      && cp -R "$PROD/Grungr.clap"      artifacts/clap/
          [[ -d "$PROD/Grungr.component" ]] && cp -R "$PROD/Grungr.component" artifacts/au/

      - name: Upload Grungr VST3 (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: Grungr-VST3-macOS
          path: artifacts/vst3/Grungr.vst3
          if-no-files-found: error

      - name: Upload Grungr CLAP (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: Grungr-CLAP-macOS
          path: artifacts/clap/Grungr.clap
          if-no-files-found: warn

      - name: Upload Grungr AUv2 (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: Grungr-AUv2-macOS
          path: artifacts/au/Grungr.component
          if-no-files-found: warn