name: Build Grungr

on:
  push:
    paths:
      - 'Grungr/**'
      - '.github/workflows/grungr-build.yml'
  pull_request:
    paths:
      - 'Grungr/**'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clone iPlug2 framework
        shell: bash
        run: |
          git clone --depth 1 --shallow-submodules https://github.com/iPlug2/iPlug2.git iPlug2

      - name: Download iPlug2 SDKs (VST3)
        shell: bash
        working-directory: iPlug2/Dependencies/IPlug
        run: bash download-iplug-sdks.sh

      - name: Install Faust (2.81.2)
        shell: pwsh
        run: |
          $faustInstaller = "$env:TEMP\Faust-2.81.2-win64.exe"
          Write-Host "Downloading Faust 2.81.2..."
          Invoke-WebRequest -Uri "https://github.com/grame-cncm/faust/releases/download/2.81.2/Faust-2.81.2-win64.exe" -OutFile $faustInstaller -UseBasicParsing
          Write-Host "Installing Faust (silent)..."
          $proc = Start-Process -FilePath $faustInstaller -ArgumentList "/S","/D=C:\Program Files\Faust" -Wait -PassThru
          Write-Host "Faust installer exit code: $($proc.ExitCode)"
          if (Test-Path "C:\Program Files\Faust\include\faust\dsp\dsp.h") {
            Write-Host "Faust headers installed at C:\Program Files\Faust\include"
          } else {
            Write-Host "ERROR: Faust headers not found at expected location"
            exit 1
          }

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Grungr VST3 (Windows)
        shell: pwsh
        working-directory: Grungr
        run: |
          $msbuild = (Get-Command msbuild.exe -ErrorAction Stop).Source
          Write-Host "Using MSBuild: $msbuild"
          & $msbuild projects\Grungr-vst3.vcxproj /p:Configuration=Release /p:Platform=x64 "/p:SolutionDir=$($env:GITHUB_WORKSPACE)\Grungr\" /v:m

      - name: Upload VST3 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Grungr-Windows
          path: Grungr/build-win/vst3/x64/Release/Grungr.vst3
