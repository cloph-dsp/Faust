name: Build Freeze95

on:
  push:
    branches: [main]
    paths:
      - "Freeze95/**"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main]
    paths:
      - "Freeze95/**"
  workflow_dispatch:

env:
  BINARY_NAME: Freeze95

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Checkout iPlug2 framework
        run: git clone --depth 1 --shallow-submodules https://github.com/iPlug2/iPlug2.git Freeze95/iPlug2

      - name: Download SDKs (VST3 + CLAP)
        shell: bash
        working-directory: Freeze95/iPlug2/Dependencies/IPlug
        run: bash download-iplug-sdks.sh

      - name: Setup Freeze95 resources
        working-directory: Freeze95
        run: |
          Copy-Item Freeze95.cpp iPlug2/Examples/IPlugEffect/IPlugEffect.cpp -Force
          Copy-Item Freeze95.h iPlug2/Examples/IPlugEffect/IPlugEffect.h -Force
          Copy-Item Freeze95.h iPlug2/Examples/IPlugEffect/Freeze95.h -Force
          Copy-Item config.h iPlug2/Examples/IPlugEffect/config.h -Force
          Copy-Item Freeze95DSP.h iPlug2/Examples/IPlugEffect/Freeze95DSP.h -Force
          Copy-Item resources/* iPlug2/Examples/IPlugEffect/resources/ -Force
          Copy-Item Freeze95DOS.ttf iPlug2/Examples/IPlugEffect/Freeze95DOS.ttf -Force

      - name: Build VST3
        working-directory: Freeze95
        run: |
          $msbuild = "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe"
          if (!(Test-Path $msbuild)) {
            $msbuild = Resolve-Path "${env:ProgramFiles}\Microsoft Visual Studio\*\MSBuild\Current\Bin\MSBuild.exe" | Select-Object -First 1
          }
          $solutionDir = (Resolve-Path ".").Path + "\"
          & $msbuild "iPlug2/Examples/IPlugEffect/projects/IPlugEffect-vst3.vcxproj" "/p:Configuration=Release" "/p:Platform=x64" "/p:SolutionDir=$solutionDir" /v:m

      - name: Build CLAP
        working-directory: Freeze95
        run: |
          $msbuild = "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe"
          if (!(Test-Path $msbuild)) {
            $msbuild = Resolve-Path "${env:ProgramFiles}\Microsoft Visual Studio\*\MSBuild\Current\Bin\MSBuild.exe" | Select-Object -First 1
          }
          $solutionDir = (Resolve-Path ".").Path + "\"
          & $msbuild "iPlug2/Examples/IPlugEffect/projects/IPlugEffect-clap.vcxproj" "/p:Configuration=Release" "/p:Platform=x64" "/p:SolutionDir=$solutionDir" /v:m

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Freeze95-Windows-VST3
          path: Freeze95/build-win/Freeze95.vst3

      - name: Upload CLAP artifact
        uses: actions/upload-artifact@v4
        with:
          name: Freeze95-Windows-CLAP
          path: Freeze95/build-win/clap/x64/Release/Freeze95.clap

  build-macos:
    name: macOS
    runs-on: getmac
    steps:
      - uses: actions/checkout@v4

      - name: Checkout iPlug2 framework
        run: git clone --depth 1 --shallow-submodules https://github.com/iPlug2/iPlug2.git Freeze95/iPlug2

      - name: Download SDKs (VST3 + CLAP)
        working-directory: Freeze95/iPlug2/Dependencies/IPlug
        run: bash download-iplug-sdks.sh

      - name: Setup Freeze95 resources
        run: |
          cd Freeze95
          cp Freeze95.cpp iPlug2/Examples/IPlugEffect/IPlugEffect.cpp
          cp Freeze95.h iPlug2/Examples/IPlugEffect/IPlugEffect.h
          cp Freeze95.h iPlug2/Examples/IPlugEffect/Freeze95.h
          cp config.h iPlug2/Examples/IPlugEffect/config.h
          cp Freeze95DSP.h iPlug2/Examples/IPlugEffect/Freeze95DSP.h
          cp Freeze95.entitlements iPlug2/Examples/IPlugEffect/Freeze95.entitlements
          cp resources/* iPlug2/Examples/IPlugEffect/resources/ 2>/dev/null || true
          cp Freeze95DOS.ttf iPlug2/Examples/IPlugEffect/Freeze95DOS.ttf 2>/dev/null || true
          cd iPlug2/Examples/IPlugEffect/resources
          for f in IPlugEffect-*.plist; do
            [ -f "$f" ] && cp "$f" "Freeze95${f#IPlugEffect}" || true
          done

      - name: Write Freeze95 xcconfig
        run: |
          cat > Freeze95/iPlug2/Examples/IPlugEffect/config/IPlugEffect-mac.xcconfig << 'EOF'
          IPLUG2_ROOT = ../../..
          #include "../../../common-mac.xcconfig"
          BINARY_NAME = Freeze95
          EXTRA_INC_PATHS = $(IGRAPHICS_INC_PATHS) $(SRCROOT)/../../../..
          EXTRA_ALL_DEFS = IGRAPHICS_NANOVG IGRAPHICS_METAL
          EXTRA_LNK_FLAGS = -framework Metal -framework MetalKit
          ARCHS = x86_64 arm64
          RELEASE_OPTIMIZE = 3
          MACOSX_DEPLOYMENT_TARGET = 11.0
          CODE_SIGNING_REQUIRED = YES
          CODE_SIGN_IDENTITY = -
          // macOS 15+ ad-hoc cannot embed entitlements — skip CODE_SIGN_ENTITLEMENTS
          // Hardened runtime without entitlements blocks dlopen in DAWs, so no --options=runtime
          EOF

      - name: Build VST3
        run: |
          cd Freeze95/iPlug2/Examples/IPlugEffect
          xcodebuild -project projects/IPlugEffect-macOS.xcodeproj \
            -scheme "macOS-VST3" \
            -configuration Release \
            -arch x86_64 -arch arm64 \
            BUILD_DIR="${{ github.workspace }}/Freeze95/build-mac" \
            VST3_PATH="${{ github.workspace }}/Freeze95/build-mac/Products"

      - name: Build CLAP
        run: |
          cd Freeze95/iPlug2/Examples/IPlugEffect
          xcodebuild -project projects/IPlugEffect-macOS.xcodeproj \
            -scheme "macOS-CLAP" \
            -configuration Release \
            -arch x86_64 -arch arm64 \
            BUILD_DIR="${{ github.workspace }}/Freeze95/build-mac" \
            CLAP_PATH="${{ github.workspace }}/Freeze95/build-mac/Products"

      - name: Fix Info.plist — update all fields to Freeze95 branding
        run: |
          for BUNDLE in Freeze95/build-mac/Products/Freeze95.vst3 Freeze95/build-mac/Products/Freeze95.clap; do
            PLIST="$BUNDLE/Contents/Info.plist"
            if [ -f "$PLIST" ]; then
              /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable Freeze95" "$PLIST" || true
              /usr/libexec/PlistBuddy -c "Set :CFBundleName Freeze95" "$PLIST" || true
              /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.cloph.Freeze95" "$PLIST" || true
              /usr/libexec/PlistBuddy -c "Set :CFBundleGetInfoString 'Freeze95 v1.3.0 Copyright 2026 cloph'" "$PLIST" || true
              /usr/libexec/PlistBuddy -c "Set :CFBundleSignature 'Frz5'" "$PLIST" || true
              /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString '1.3.0'" "$PLIST" || true
              /usr/libexec/PlistBuddy -c "Set :CFBundleVersion '1.3.0'" "$PLIST" || true
              /usr/libexec/PlistBuddy -c "Set :LSMinimumSystemVersion '11.0'" "$PLIST" || true
            fi
          done

      - name: Ad-hoc sign bundles (re-sign after plist modification)
        run: |
          for BUNDLE in Freeze95/build-mac/Products/Freeze95.vst3 Freeze95/build-mac/Products/Freeze95.clap; do
            if [ -d "$BUNDLE" ]; then
              BINARY="$BUNDLE/Contents/MacOS/Freeze95"
              echo "Signing binary: $BINARY"
              # Ad-hoc sign WITHOUT hardened runtime — macOS 15+ ad-hoc cannot embed entitlements
              # Hardened runtime + zero entitlements would break dlopen in DAWs, so skip --options=runtime
              codesign --force --sign - "$BINARY"
              echo "Signing bundle wrapper: $BUNDLE"
              codesign --force --sign - "$BUNDLE"
              codesign -vvv --deep "$BUNDLE" || echo "Warning: signature verification had issues"
            fi
          done

      - name: Generate VST3 moduleinfo.json
        run: |
          mkdir -p Freeze95/build-mac/Products/Freeze95.vst3/Contents/Resources
          cat > Freeze95/build-mac/Products/Freeze95.vst3/Contents/Resources/moduleinfo.json << 'JSONEOF'
          {
            "Name": "Freeze95",
            "Version": "1.0.0",
            "SDKVersion": "VST 3.7.0",
            "URL": "https://cloph-dsp.github.io",
            "Email": "",
            "Flags": {
              "Unicode": true
            }
          }
          JSONEOF
          # Re-sign VST3 binary (moduleinfo.json addition invalidated the bundle)
          # WARNING: macOS 15+ ad-hoc CANNOT embed entitlements. Don't use --options=runtime
          # or --entitlements — hardened runtime without entitlements blocks dlopen in DAWs.
          VST3_BIN="Freeze95/build-mac/Products/Freeze95.vst3/Contents/MacOS/Freeze95"
          codesign --force --sign - "$VST3_BIN"
          # Then re-sign bundle wrapper
          codesign --force --sign - Freeze95/build-mac/Products/Freeze95.vst3

      - name: Validate code signatures
        run: |
          for BUNDLE in Freeze95/build-mac/Products/Freeze95.vst3 Freeze95/build-mac/Products/Freeze95.clap; do
            echo "=== Validating $BUNDLE ==="
            codesign -dvv "$BUNDLE" || true
            codesign -vvv --deep "$BUNDLE" || true
            echo ""
          done

      - name: Final macOS plugin validation (comprehensive)
        run: |
          set -euo pipefail
          VST3="Freeze95/build-mac/Products/Freeze95.vst3"
          CLAP="Freeze95/build-mac/Products/Freeze95.clap"
          VST3_BIN="$VST3/Contents/MacOS/Freeze95"
          CLAP_BIN="$CLAP/Contents/MacOS/Freeze95"
          ERRORS=0

          error() {
            echo "ERROR: $1"
            ERRORS=$((ERRORS + 1))
          }

          echo "========================================"
          echo "COMPREHENSIVE MACOS PLUGIN VALIDATION"
          echo "========================================"

          # ============================================================
          # 1. BUNDLE STRUCTURE & FILES
          # ============================================================
          echo ""
          echo "[1/10] Bundle Structure Check"
          echo "------------------------------"

          for BUNDLE in "$VST3" "$CLAP"; do
            echo "Checking $(basename $BUNDLE)..."
            test -d "$BUNDLE" || error "Bundle directory missing: $BUNDLE"
            test -d "$BUNDLE/Contents" || error "Contents/ missing in $BUNDLE"
            test -d "$BUNDLE/Contents/MacOS" || error "Contents/MacOS/ missing in $BUNDLE"
            test -f "$BUNDLE/Contents/Info.plist" || error "Contents/Info.plist missing in $BUNDLE"
            test -f "$BUNDLE/Contents/MacOS/Freeze95" || error "Binary missing in $BUNDLE/Contents/MacOS/"
          done

          # Check VST3-specific files
          test -f "$VST3/Contents/Resources/moduleinfo.json" || error "VST3 moduleinfo.json missing"
          test -f "$VST3/Contents/_CodeSignature/CodeResources" || error "VST3 CodeResources missing"

          # Check for unexpected nested bundles (common failure mode)
          if find "$VST3" -maxdepth 1 -type d | grep -v "^$VST3$" | grep -v "/Contents$"; then
            error "Unexpected nested directories in VST3 bundle"
          fi

          # Check file permissions (executables must be executable)
          test -x "$VST3_BIN" || error "VST3 binary is not executable"
          test -x "$CLAP_BIN" || error "CLAP binary is not executable"

          # Check for symlinks (shouldn't have any in a clean build)
          if find "$VST3" -type l | grep -q .; then
            error "VST3 bundle contains symlinks"
          fi

          echo "Bundle structure: OK"

          # ============================================================
          # 2. INFO.PLIST COMPLETENESS & CORRECTNESS
          # ============================================================
          echo ""
          echo "[2/10] Info.plist Validation"
          echo "-----------------------------"

          for BUNDLE in "$VST3" "$CLAP"; do
            PLIST="$BUNDLE/Contents/Info.plist"
            echo "Checking $(basename $BUNDLE)/Contents/Info.plist..."

            # Syntax validation
            plutil -lint "$PLIST" >/dev/null || error "Invalid plist syntax: $PLIST"

            # Required keys
            for KEY in CFBundleExecutable CFBundleIdentifier CFBundleName CFBundlePackageType CFBundleShortVersionString CFBundleVersion CFBundleInfoDictionaryVersion; do
              if ! /usr/libexec/PlistBuddy -c "Print :$KEY" "$PLIST" >/dev/null 2>&1; then
                error "Missing required plist key $KEY in $(basename $BUNDLE)"
              fi
            done

            # Correct values
            BUNDLE_EXEC=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$PLIST" 2>/dev/null || echo "")
            BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$PLIST" 2>/dev/null || echo "")
            BUNDLE_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleName" "$PLIST" 2>/dev/null || echo "")
            BUNDLE_VER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST" 2>/dev/null || echo "")
            BUNDLE_PKG_TYPE=$(/usr/libexec/PlistBuddy -c "Print :CFBundlePackageType" "$PLIST" 2>/dev/null || echo "")

            [ "$BUNDLE_EXEC" = "Freeze95" ] || error "CFBundleExecutable mismatch in $(basename $BUNDLE): got '$BUNDLE_EXEC', expected 'Freeze95'"
            [ "$BUNDLE_ID" = "com.cloph.Freeze95" ] || error "CFBundleIdentifier mismatch in $(basename $BUNDLE): got '$BUNDLE_ID'"
            [ "$BUNDLE_NAME" = "Freeze95" ] || error "CFBundleName mismatch in $(basename $BUNDLE): got '$BUNDLE_NAME'"
            [ "$BUNDLE_VER" = "1.3.0" ] || error "CFBundleShortVersionString mismatch in $(basename $BUNDLE): got '$BUNDLE_VER', expected '1.3.0'"
            [ "$BUNDLE_PKG_TYPE" = "BNDL" ] || error "CFBundlePackageType must be BNDL, got '$BUNDLE_PKG_TYPE'"

            # No template residue
            if grep -qi "IPlugEffect\|Acme Inc\|Acme" "$PLIST"; then
              error "Info.plist still contains template values (IPlugEffect/Acme) in $(basename $BUNDLE)"
            fi
          done

          echo "Info.plist: OK"

          # ============================================================
          # 3. BINARY ARCHITECTURE & UNIVERSAL BUILD
          # ============================================================
          echo ""
          echo "[3/10] Binary Architecture Check"
          echo "---------------------------------"

          for BIN in "$VST3_BIN" "$CLAP_BIN"; do
            echo "Checking $(basename $(dirname $(dirname $BIN)))/$(basename $BIN)..."

            # Must be Mach-O universal
            file "$BIN" | grep -q "Mach-O universal binary" || error "Not a Mach-O universal binary: $BIN"

            # Must contain both architectures
            LIPO_OUT=$(lipo -info "$BIN" 2>&1)
            echo "$LIPO_OUT"
            echo "$LIPO_OUT" | grep -q "x86_64" || error "Missing x86_64 in $BIN"
            echo "$LIPO_OUT" | grep -q "arm64" || error "Missing arm64 in $BIN"

            # Binary size check (should be > 1MB for a real plugin)
            SIZE=$(stat -f%z "$BIN" 2>/dev/null || stat -c%s "$BIN" 2>/dev/null || echo 0)
            if [ "$SIZE" -lt 1048576 ]; then
              error "Binary suspiciously small ($SIZE bytes): $BIN"
            fi
            echo "Binary size: $SIZE bytes"
          done

          echo "Binary architecture: OK"

          # ============================================================
          # 4. CODE SIGNATURE INTEGRITY
          # ============================================================
          echo ""
          echo "[4/10] Code Signature Check"
          echo "----------------------------"

          for BUNDLE in "$VST3" "$CLAP"; do
            echo "Checking $(basename $BUNDLE)..."

            # Strict signature verification (no --deep here, check bundle itself)
            codesign -vvv "$BUNDLE" || error "Signature verification failed for $(basename $BUNDLE)"

            # Verify signature is ad-hoc
            CS_INFO=$(codesign -dvv "$BUNDLE" 2>&1)
            echo "$CS_INFO"
            echo "$CS_INFO" | grep -q "Signature=adhoc" || error "Not ad-hoc signed: $(basename $BUNDLE)"
              # Allow either adhoc,runtime or just adhoc (macOS 15+ can't embed entitlements ad-hoc)
              if echo "$CS_INFO" | grep -q "adhoc,runtime"; then
                echo "  Hardened runtime: enabled"
              else
                echo "  Hardened runtime: disabled (expected — ad-hoc on macOS 15+ can't embed entitlements)"
              fi

            # Verify CodeDirectory exists and is sealed
            echo "$CS_INFO" | grep -q "Sealed Resources" || error "Sealed Resources missing: $(basename $BUNDLE)"

            # Check that no files are modified after signing
            if codesign -vvv "$BUNDLE" 2>&1 | grep -qi "modified"; then
              error "Files modified after signing in $(basename $BUNDLE)"
            fi
          done

          echo "Code signature: OK"

          # ============================================================
          # 5. ENTITLEMENTS (skip if no hardened runtime — ad-hoc on macOS 15+ can't embed)
          # ============================================================
          echo ""
          echo "[5/10] Entitlements Check"
          echo "-------------------------"

          check_entitlements() {
            local BIN="$1"
            local NAME="$2"
            local CS_INFO=$(codesign -dvv "$BIN" 2>&1 || echo "")
            if echo "$CS_INFO" | grep -q "runtime"; then
              # Hardened runtime is enabled — check entitlements
              local ENTITLEMENTS=$(codesign -d --entitlements - "$BIN" 2>/dev/null || echo "")
              if [ -z "$ENTITLEMENTS" ]; then
                error "No entitlements found in $NAME (has hardened runtime)"
              else
                echo "$ENTITLEMENTS" | grep -q "com.apple.security.cs.disable-library-validation" || \
                  error "Missing disable-library-validation entitlement in $NAME"
              fi
            else
              echo "SKIP: $NAME has no hardened runtime — entitlements not applicable"
            fi
          }

          check_entitlements "$VST3_BIN" "VST3"
          check_entitlements "$CLAP_BIN" "CLAP"

          echo "Entitlements: OK"

          # ============================================================
          # 6. BINARY LINKING & DEPENDENCIES
          # ============================================================
          echo ""
          echo "[6/10] Binary Dependencies Check"
          echo "---------------------------------"

          for BIN in "$VST3_BIN" "$CLAP_BIN"; do
            echo "Checking $(basename $(dirname $(dirname $BIN)))/$(basename $BIN)..."

            # Check for required frameworks
            OTOOL_OUT=$(otool -L "$BIN" 2>&1)
            echo "$OTOOL_OUT"

            # Must link Metal (for UI)
            echo "$OTOOL_OUT" | grep -q "Metal.framework" || error "Metal.framework not linked: $(basename $BIN)"

            # Must link MetalKit
            echo "$OTOOL_OUT" | grep -q "MetalKit.framework" || error "MetalKit.framework not linked: $(basename $BIN)"

            # Must NOT have unresolvable @rpath references
            if echo "$OTOOL_OUT" | grep -q "@rpath.*not found"; then
              error "Unresolved @rpath reference in $(basename $BIN)"
            fi

            # Check for suspicious dylib dependencies (shouldn't depend on Homebrew/etc)
            if echo "$OTOOL_OUT" | grep -Ei "/usr/local/|/opt/homebrew/|/brew/"; then
              error "Binary depends on Homebrew paths: $(basename $BIN)"
            fi
          done

          echo "Binary dependencies: OK"

          # ============================================================
          # 7. MODULEINFO.JSON (VST3 only)
          # ============================================================
          echo ""
          echo "[7/10] moduleinfo.json Check"
          echo "-----------------------------"

          if [ -f "$VST3/Contents/Resources/moduleinfo.json" ]; then
            # Valid JSON
            python3 -c "import json; json.load(open('$VST3/Contents/Resources/moduleinfo.json'))" || error "Invalid JSON in moduleinfo.json"

            # Required fields
            MOD_NAME=$(python3 -c "import json; print(json.load(open('$VST3/Contents/Resources/moduleinfo.json')).get('Name',''))")
            MOD_VER=$(python3 -c "import json; print(json.load(open('$VST3/Contents/Resources/moduleinfo.json')).get('Version',''))")
            MOD_SDK=$(python3 -c "import json; print(json.load(open('$VST3/Contents/Resources/moduleinfo.json')).get('SDKVersion',''))")

            [ "$MOD_NAME" = "Freeze95" ] || error "moduleinfo.json Name mismatch: got '$MOD_NAME'"
            [ -n "$MOD_VER" ] || error "moduleinfo.json Version is empty"
            echo "$MOD_SDK" | grep -q "VST" || error "moduleinfo.json SDKVersion must contain 'VST', got '$MOD_SDK'"

            echo "moduleinfo.json: OK (Name=$MOD_NAME, Version=$MOD_VER)"
          else
            error "moduleinfo.json missing"
          fi

          # ============================================================
          # 8. BUNDLE SIZE SANITY CHECKS
          # ============================================================
          echo ""
          echo "[8/10] Bundle Size Check"
          echo "------------------------"

          for BUNDLE in "$VST3" "$CLAP"; do
            SIZE=$(du -sk "$BUNDLE" | awk '{print $1}')
            echo "$(basename $BUNDLE): ${SIZE}KB"

            # A real plugin should be > 500KB, < 200MB
            if [ "$SIZE" -lt 500 ]; then
              error "Bundle suspiciously small (${SIZE}KB): $(basename $BUNDLE)"
            fi
            if [ "$SIZE" -gt 204800 ]; then
              error "Bundle suspiciously large (${SIZE}KB): $(basename $BUNDLE)"
            fi
          done

          echo "Bundle size: OK"

          # ============================================================
          # 9. QUARANTINE / EXTENDED ATTRIBUTES
          # ============================================================
          echo ""
          echo "[9/10] Extended Attributes Check"
          echo "---------------------------------"

          for BUNDLE in "$VST3" "$CLAP"; do
            XATTRS=$(xattr -l "$BUNDLE" 2>/dev/null || echo "")
            if echo "$XATTRS" | grep -q "com.apple.quarantine"; then
              error "Quarantine attribute still present on $(basename $BUNDLE)"
            fi
            echo "$(basename $BUNDLE) extended attributes: OK"
          done

          echo "Extended attributes: OK"

          # ============================================================
          # 10. BINARY HEADERS & FLAGS
          # ============================================================
          echo ""
          echo "[10/10] Mach-O Header Flags"
          echo "----------------------------"

          for BIN in "$VST3_BIN" "$CLAP_BIN"; do
            echo "Checking $(basename $(dirname $(dirname $BIN)))/$(basename $BIN)..."

            # Check for position-independent executable (PIE) flag
            # All modern macOS binaries should have this
            if ! otool -hv "$BIN" 2>/dev/null | grep -q "PIE"; then
              echo "WARNING: PIE flag not found in $(basename $BIN)"
            fi

            # Check minimum OS version in binary
            MINOS=$(otool -l "$BIN" 2>/dev/null | grep -A2 "LC_BUILD_VERSION" | grep "minos" | awk '{print $2}' | head -1 || echo "")
            if [ -n "$MINOS" ]; then
              echo "Minimum OS version: $MINOS"
            fi
          done

          echo "Mach-O headers: OK"

          # ============================================================
          # SUMMARY
          # ============================================================
          echo ""
          echo "========================================"
          if [ "$ERRORS" -eq 0 ]; then
            echo "ALL VALIDATIONS PASSED (10/10)"
            echo "========================================"
            exit 0
          else
            echo "VALIDATION FAILED: $ERRORS error(s) found"
            echo "========================================"
            exit 1
          fi

      - name: Verify macOS VST3 bundle
        run: |
          VST3_BUNDLE="${{ github.workspace }}/Freeze95/build-mac/Products/Freeze95.vst3"
          if [ ! -d "$VST3_BUNDLE" ]; then
            echo "ERROR: VST3 bundle not found at $VST3_BUNDLE"
            exit 1
          fi
          echo "VST3 bundle found at: $VST3_BUNDLE"
          ls -la "$VST3_BUNDLE/Contents/"
          if [ ! -f "$VST3_BUNDLE/Contents/MacOS/Freeze95" ]; then
            echo "ERROR: Binary not found in VST3 bundle Contents/MacOS/"
            echo "Contents of MacOS dir:"
            ls -la "$VST3_BUNDLE/Contents/MacOS/" || echo "MacOS dir missing"
            exit 1
          fi
          echo "Binary verified: $VST3_BUNDLE/Contents/MacOS/Freeze95"
          file "$VST3_BUNDLE/Contents/MacOS/Freeze95"
          lipo -info "$VST3_BUNDLE/Contents/MacOS/Freeze95"

      - name: Verify macOS CLAP bundle
        run: |
          CLAP_BUNDLE="${{ github.workspace }}/Freeze95/build-mac/Products/Freeze95.clap"
          if [ ! -d "$CLAP_BUNDLE" ]; then
            echo "ERROR: CLAP bundle not found at $CLAP_BUNDLE"
            exit 1
          fi
          echo "CLAP bundle found at: $CLAP_BUNDLE"
          ls -la "$CLAP_BUNDLE/Contents/"
          if [ ! -f "$CLAP_BUNDLE/Contents/MacOS/Freeze95" ]; then
            echo "ERROR: Binary not found in CLAP bundle Contents/MacOS/"
            echo "Contents of MacOS dir:"
            ls -la "$CLAP_BUNDLE/Contents/MacOS/" || echo "MacOS dir missing"
            exit 1
          fi
          echo "Binary verified: $CLAP_BUNDLE/Contents/MacOS/Freeze95"
          file "$CLAP_BUNDLE/Contents/MacOS/Freeze95"
          lipo -info "$CLAP_BUNDLE/Contents/MacOS/Freeze95"

      - name: VST3 binary load tests
        if: always()
        run: |
          set -euo pipefail
          VST3_BIN="Freeze95/build-mac/Products/Freeze95.vst3/Contents/MacOS/Freeze95"
          CLAP_BIN="Freeze95/build-mac/Products/Freeze95.clap/Contents/MacOS/Freeze95"
          ERRORS=0

          error() { echo "FAIL: $1"; ERRORS=$((ERRORS + 1)); }

          echo "========================================"
          echo "BINARY LOAD & EXPORT TESTS"
          echo "========================================"

          # ============================================================
          # 1. VST3 ENTRY-POINT EXPORTS
          # ============================================================
          echo ""
          echo "[1/3] VST3 Entry-Point Exports"
          echo "-----------------------------"

          VST3_EXPORTS=$(nm -gU "$VST3_BIN" 2>&1)
          echo "$VST3_EXPORTS" | grep -q "GetPluginFactory" || error "GetPluginFactory not exported in VST3 binary"
          echo "  GetPluginFactory: FOUND"

          # Also check CLAP entry
          CLAP_EXPORTS=$(nm -gU "$CLAP_BIN" 2>&1)
          echo "$CLAP_EXPORTS" | grep -q "clap_entry" || error "clap_entry not exported in CLAP binary"
          echo "  clap_entry: FOUND"

          echo "  Extra VST3 exports:"
          echo "$VST3_EXPORTS" | grep -v "^$" | grep -v "^.*_T" | grep -v "^.*OSSpin" | grep -v "dyld_stub_binder" | head -20

          # ============================================================
          # 2. UNDEFINED SYMBOLS
          # ============================================================
          echo ""
          echo "[2/3] Undefined (imported) symbols"
          echo "----------------------------------"

          for BIN in "$VST3_BIN" "$CLAP_BIN"; do
            NAME=$(basename "$(dirname "$(dirname "$BIN")")")
            UNDEFINED=$(nm -u "$BIN" 2>&1 | grep -v "^$" || true)
            COUNT=$(echo "$UNDEFINED" | grep -c . || true)
            echo "  $NAME: $COUNT undefined symbol(s) (expected for framework-linked binaries)"
            echo "$UNDEFINED" | grep -v "^$" | grep -v "^.*_T" | head -20
          done

          # ============================================================
          # 3. dlopen LOAD TEST
          # ============================================================
          echo ""
          echo "[3/3] dlopen load test"
          echo "----------------------"
          echo "  Compiling VST3 loader..."

          cat > /tmp/vst3_loader.c << 'CEOF'
          #include <dlfcn.h>
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>

          int main(int argc, char** argv) {
              if (argc < 2) {
                  fprintf(stderr, "Usage: %s <binary_path>\n", argv[0]);
                  return 1;
              }

              char* resolved = realpath(argv[1], NULL);
              if (!resolved) {
                  fprintf(stderr, "realpath FAILED: %s\n", argv[1]);
                  return 1;
              }

              fprintf(stderr, "  Binary: %s\n", resolved);

              // RTLD_NOW = resolve all symbols immediately; if any dep is missing this fails
              void* handle = dlopen(resolved, RTLD_NOW | RTLD_LOCAL);
              if (!handle) {
                  fprintf(stderr, "  dlopen: FAILED\n");
                  fprintf(stderr, "  Reason: %s\n", dlerror());
                  free(resolved);
                  return 1;
              }

              // Check for VST3 entry (GetPluginFactory) or CLAP entry (clap_entry)
              void* factory = dlsym(handle, "GetPluginFactory");
              void* clap_entry = dlsym(handle, "clap_entry");
              if (!factory && !clap_entry) {
                  fprintf(stderr, "  Entry point: NOT FOUND (checked GetPluginFactory and clap_entry)\n");
                  dlclose(handle);
                  free(resolved);
                  return 1;
              }

              printf("  dlopen:       SUCCESS\n");
              if (factory) printf("  GetPluginFactory: %p\n", factory);
              if (clap_entry) printf("  clap_entry:      %p\n", clap_entry);
              dlclose(handle);
              free(resolved);
              return 0;
          }
          CEOF

          clang -o /tmp/vst3_loader /tmp/vst3_loader.c -framework CoreFoundation 2>&1 || {
            echo "  WARNING: Could not compile VST3 loader (clang unavailable?)"
            exit 0
          }

          echo ""
          for BIN in "$VST3_BIN" "$CLAP_BIN"; do
            NAME=$(basename "$(dirname "$(dirname "$BIN")")")
            echo "  Testing $NAME..."
            if /tmp/vst3_loader "$BIN"; then
              echo "  $NAME: LOAD OK"
            else
              error "$NAME binary failed dlopen load test"
            fi
            echo ""
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo "FAILED: $ERRORS error(s) found"
            exit 1
          fi
          echo "ALL LOAD TESTS PASSED"

      - name: VST3 lifecycle test
        if: always()
        run: |
          VST3_BUNDLE="Freeze95/build-mac/Products/Freeze95.vst3"
          CLAP_BUNDLE="Freeze95/build-mac/Products/Freeze95.clap"
          VST3_SDK="-I iPlug2/Dependencies/IPlug/VST3_SDK"
          TEST_SRC="Freeze95/tests/lifecycle_test.cpp"

          if [ ! -d "$VST3_BUNDLE" ]; then
            echo "WARNING: VST3 bundle not found, skipping lifecycle test"
            exit 0
          fi

          echo "Compiling lifecycle test..."
          clang++ -std=c++17 $VST3_SDK -o /tmp/freeze95_test "$TEST_SRC" -framework CoreFoundation 2>&1 || {
            echo "WARNING: Could not compile lifecycle test (compilation error)"
            exit 0
          }
          echo "Compilation: OK"

          echo ""
          echo "================================================"
          echo "  LIFE CYCLE TEST - VST3"
          echo "================================================"
          if /tmp/freeze95_test "$VST3_BUNDLE"; then
            echo ""
            echo "LIFECYCLE VST3: PASSED"
          else
            echo ""
            echo "LIFECYCLE VST3: FAILED"
            exit 1
          fi

          echo ""
          echo "================================================"
          echo "  LIFE CYCLE TEST - CLAP"
          echo "================================================"
          if [ -d "$CLAP_BUNDLE" ]; then
            if /tmp/freeze95_test "$CLAP_BUNDLE"; then
              echo ""
              echo "LIFECYCLE CLAP: PASSED"
            else
              echo ""
              echo "LIFECYCLE CLAP: FAILED"
              exit 1
            fi
          else
            echo "CLAP bundle not found, skipping"
          fi

      - name: Stage VST3 artifact
        if: always()
        run: |
          mkdir -p Freeze95/build-mac/stage-vst3
          cp -R Freeze95/build-mac/Products/Freeze95.vst3 Freeze95/build-mac/stage-vst3/

      - name: Upload VST3 artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Freeze95-macOS-VST3
          path: Freeze95/build-mac/stage-vst3/

      - name: Stage CLAP artifact
        if: always()
        run: |
          mkdir -p Freeze95/build-mac/stage-clap
          cp -R Freeze95/build-mac/Products/Freeze95.clap Freeze95/build-mac/stage-clap/

      - name: Upload CLAP artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Freeze95-macOS-CLAP
          path: Freeze95/build-mac/stage-clap/
