name: Build Freeze95

on:
  push:
    branches: [main]
    paths:
      - "Freeze95/**"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main]
    paths:
      - "Freeze95/**"
  workflow_dispatch:

env:
  BINARY_NAME: Freeze95
  IPLUG2_ROOT: ${{ github.workspace }}/Freeze95/iPlug2

jobs:
  build-windows:
    name: Windows (VST3)
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Build with MSBuild
        working-directory: Freeze95
        run: |
          $msbuild = "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe"
          if (!(Test-Path $msbuild)) {
            $msbuild = Resolve-Path "${env:ProgramFiles}\Microsoft Visual Studio\*\MSBuild\Current\Bin\MSBuild.exe" | Select-Object -First 1
          }
          $project = "iPlug2/Examples/IPlugEffect/projects/IPlugEffect-vst3.vcxproj"
          $solutionDir = (Resolve-Path ".").Path + "\"
          & $msbuild $project "/p:Configuration=Release" "/p:Platform=x64" "/p:SolutionDir=$solutionDir" /v:m

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Freeze95-Windows
          path: Freeze95/build-win/Freeze95.vst3

  build-macos:
    name: macOS (VST3)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build VST3
        run: |
          cd Freeze95

          # Swap Freeze95 source into IPlugEffect's place so the Xcode project compiles it
          cp Freeze95.cpp iPlug2/Examples/IPlugEffect/IPlugEffect.cpp
          cp Freeze95.h iPlug2/Examples/IPlugEffect/IPlugEffect.h
          cp config.h iPlug2/Examples/IPlugEffect/config.h

          # Write a Freeze95 xcconfig that points to Freeze95 headers
          cat > iPlug2/Examples/IPlugEffect/config/IPlugEffect-mac.xcconfig << 'XCCONFIG'
          IPLUG2_ROOT = ../../..
          #include "../../../common-mac.xcconfig"
          BINARY_NAME = Freeze95
          EXTRA_INC_PATHS = $(IGRAPHICS_INC_PATHS) $(SRCROOT)/../../../..
          EXTRA_ALL_DEFS = IGRAPHICS_NANOVG IGRAPHICS_METAL
          ARCHS = $(ARCHS_STANDARD_64_BIT)
          RELEASE_OPTIMIZE = 3
          MACOSX_DEPLOYMENT_TARGET = 10.15
          CODE_SIGN_IDENTITY = -
          CODE_SIGNING_REQUIRED = NO
          XCCONFIG

          # Build VST3 target with xcodebuild
          cd iPlug2/Examples/IPlugEffect
          xcodebuild -project projects/IPlugEffect-macOS.xcodeproj \
            -target IPlugEffect-vst3 \
            -configuration Release \
            -arch x86_64 \
            BUILD_DIR="${{ github.workspace }}/Freeze95/build-mac"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Freeze95-macOS
          path: Freeze95/build-mac/Release/Freeze95.vst3


