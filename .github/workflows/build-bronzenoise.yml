name: Build Bronze Noise

on:
  push:
    branches: [main]
    paths:
      - "BronzeNoise/**"
      - ".github/workflows/build-bronzenoise.yml"
  pull_request:
    branches: [main]
    paths:
      - "BronzeNoise/**"
  workflow_dispatch:

env:
  BINARY_NAME: BronzeNoise

jobs:
  # ===========================================================================
  # Windows build -- local vcxproj for VST3; iPlug2 IPlugEffect-clap for CLAP.
  # The existing VST3 build uses BronzeNoise's own
  # projects/BronzeNoise-vst3.vcxproj.  CLAP uses the iPlug2 example project
  # with staged sources.
  # ===========================================================================
  build-windows:
    name: Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # ---------------------------------------------------------------------------
      # EXISTING VST3 build (preserved as-is -- uses local vcxproj directly)
      # ---------------------------------------------------------------------------
      - name: Build VST3 (Release x64)
        working-directory: BronzeNoise
        run: |
          Set-Location "${{ github.workspace }}\BronzeNoise"
          Get-ChildItem .
          # Path is relative to BronzeNoise/ (SolutionDir = BronzeNoise/) so the
          # $(SolutionDir)config\BronzeNoise-win.props import resolves correctly.
          Set-Location "${{ github.workspace }}\BronzeNoise"
          Get-ChildItem projects
          $project = "${{ github.workspace }}\BronzeNoise\projects\BronzeNoise-vst3.vcxproj"
          $solutionDir = (Resolve-Path ".").Path + "\"
          if (-not (Test-Path $project)) { Write-Host "MISSING: $project"; exit 2 }
          msbuild $project /p:Configuration=Release /p:Platform=x64 "/p:SolutionDir=$solutionDir" /v:m

      - name: Upload VST3 artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BronzeNoise-Windows-VST3
          path: BronzeNoise/build-win/BronzeNoise.vst3
          if-no-files-found: error

      - name: Windows PE binary-string hygiene check
        if: always()
        working-directory: BronzeNoise
        shell: pwsh
        run: |
          $ERRORS = 0
          function Error($msg) { Write-Host "ERROR: $msg" -ForegroundColor Red; $script:ERRORS++ }
          $targets = @(
            "build-win/BronzeNoise.vst3",
            "build-win/clap/x64/Release/BronzeNoise.clap"
          )
          foreach ($t in $targets) {
            if (-not (Test-Path $t)) { Write-Host "SKIP: $t not built"; continue }
            $hits = Select-String -Path $t -Pattern 'AcmeInc|IPlugEffect|com\.AcmeInc' -CaseSensitive:$false | Select-Object -First 5
            if ($hits) {
              Write-Host "Template strings found in $t"
              $hits | ForEach-Object { Write-Host "    $($_.Line.Trim())" }
              Error "Binary contains iPlug2 template strings: $t"
            } else {
              Write-Host "clean: $t"
            }
          }
          if ($ERRORS -gt 0) { Write-Host "WINDOWS HYGIENE FAILED: $ERRORS error(s)"; exit 1 }
          Write-Host "WINDOWS HYGIENE PASSED"

      # -----------------------------------------------------------------------
      # CLAP build -- clone iPlug2, stage BronzeNoise sources, build example
      # project IPlugEffect-clap.vcxproj.  Mirrors the Tuner workflow pattern.
      # -----------------------------------------------------------------------
      - name: Checkout iPlug2 framework
        run: |
          git clone --depth 1 --shallow-submodules https://github.com/iPlug2/iPlug2.git iPlug2
          git -C iPlug2 rev-parse HEAD

      - name: Download SDKs (VST3)
        shell: bash
        working-directory: iPlug2/Dependencies/IPlug
        run: bash download-iplug-sdks.sh

      - name: Setup BronzeNoise resources into iPlug2 example for CLAP
        working-directory: BronzeNoise
        run: |
          $dst = "../iPlug2/Examples/IPlugEffect"
          # Source files
          Copy-Item -Force "BronzeNoise.cpp"        "$dst/IPlugEffect.cpp"
          Copy-Item -Force "BronzeNoise.h"          "$dst/IPlugEffect.h"
          Copy-Item -Force "BronzeNoise.h"          "$dst/BronzeNoise.h"
          Copy-Item -Force "config.h"               "$dst/config.h"
          # Scripts
          Copy-Item -Force "scripts\prebuild-win.bat"  "$dst\scripts\prebuild-win.bat"
          Copy-Item -Force "scripts\postbuild-win.bat" "$dst\scripts\postbuild-win.bat"
          # Create config/IPlugEffect-win.props from BronzeNoise-win.props with adjusted IPLUG2_ROOT
          $srcProps = Get-Content "config\BronzeNoise-win.props" -Raw
          $props = $srcProps -replace '\$\(ProjectDir\)\.\.\\\.\.\\iPlug2','$(ProjectDir)..\..\..'
          Set-Content -Path "config\IPlugEffect-win.props" -Value $props
          Copy-Item -Force "config\IPlugEffect-win.props" "$dst\config\IPlugEffect-win.props"
          # Resources (fonts, SVGs, icons, RC)
          foreach ($asset in @("main.rc", "IronSans.ttf", "KenyanCoffeeRg.ttf", "Roboto-Regular.ttf", "knob.svg", "cloph_logo.svg", "BronzeNoise.ico", "resource.h")) {
            $a = Join-Path "resources" $asset
            $b = Join-Path "$dst\resources" $asset
            if (Test-Path $a) {
              New-Item -ItemType Directory -Force -Path (Split-Path $b) | Out-Null
              Copy-Item -Force $a $b
            }
          }

      - name: Build CLAP
        working-directory: BronzeNoise
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vswhere -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe | Select-Object -First 1
          if (-not $msbuild) {
            $msbuild = Get-ChildItem "${env:ProgramFiles}\Microsoft Visual Studio\*\MSBuild\Current\Bin\MSBuild.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          }
          $solutionDir = (Resolve-Path ".").Path + "\"
          & $msbuild "../iPlug2/Examples/IPlugEffect/projects/IPlugEffect-clap.vcxproj" "/p:Configuration=Release" "/p:Platform=x64" "/p:SolutionDir=$solutionDir" /v:m

      - name: Upload CLAP artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BronzeNoise-Windows-CLAP
          path: BronzeNoise/build-win/clap/x64/Release/BronzeNoise.clap
          if-no-files-found: error

  # ===========================================================================
  # macOS build -- xcodebuild produces VST3/CLAP/AU universal (x86_64+arm64)
  # bundles.  Mirrors the Tuner workflow structure step-for-step.
  # ===========================================================================
  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout iPlug2 framework
        run: |
          git clone --depth 1 --shallow-submodules https://github.com/iPlug2/iPlug2.git iPlug2
          echo "iPlug2 SHA: $(git -C iPlug2 rev-parse HEAD)"

      - name: Download SDKs (VST3)
        working-directory: iPlug2/Dependencies/IPlug
        run: bash download-iplug-sdks.sh

      - name: Setup BronzeNoise resources into iPlug2 example
        working-directory: BronzeNoise
        run: |
          dst="../iPlug2/Examples/IPlugEffect"
          cp BronzeNoise.cpp               "$dst/IPlugEffect.cpp"
          cp BronzeNoise.h                 "$dst/IPlugEffect.h"
          cp BronzeNoise.h                 "$dst/BronzeNoise.h"
          cp config.h                      "$dst/config.h"
          # Stage proven Tuner-pattern xcconfig (mirrors Tuner VST workflow).
          cp config/BronzeNoise-mac.xcconfig "$dst/config/IPlugEffect-mac.xcconfig"
          cp resources/* "$dst/resources/" 2>/dev/null || true
          cd "$dst/resources"
          for f in IPlugEffect-*.plist; do
            [ -f "$f" ] && cp "$f" "BronzeNoise${f#IPlugEffect}" || true
          done

      - name: Patch IPlugEffect xcodeproj for WDL FFT (BronzeNoise)
        # BronzeNoise uses WDL_fft_init / WDL_fft / WDL_fft_permute in ProcessHop/OnReset.
        # IPlugEffect's xcodeproj doesn't include fft.c, so we patch the pbxproj to add it
        # as a Sources build entry for the 3 macOS schemes (VST3, CLAP, AUv2).
        # Idempotent, mirrors Freeze95 scripts/patch-iPlug2-for-freeze95.sh pattern.
        run: |
          chmod +x BronzeNoise/scripts/patch-iPlugEffect-for-bronzenoise.sh
          bash BronzeNoise/scripts/patch-iPlugEffect-for-bronzenoise.sh

      - name: Build VST3
        run: |
          cd iPlug2/Examples/IPlugEffect
          xcodebuild -project projects/IPlugEffect-macOS.xcodeproj \
            -scheme "macOS-VST3" \
            -configuration Release \
            -arch x86_64 -arch arm64 \
            BUILD_DIR="${{ github.workspace }}/BronzeNoise/build-mac" \
            VST3_PATH="${{ github.workspace }}/BronzeNoise/build-mac/Products"

      - name: Fix Info.plist -- BronzeNoise branding
        run: |
          VST3="BronzeNoise/build-mac/Products/BronzeNoise.vst3"
          PLIST="$VST3/Contents/Info.plist"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable BronzeNoise" "$PLIST" || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleName BronzeNoise" "$PLIST" || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.cloph-dsp.BronzeNoise" "$PLIST" || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleGetInfoString 'BronzeNoise v1.0.0 Copyright 2026 CLOPH'" "$PLIST" || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleSignature 'Bnz1'" "$PLIST" || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString '1.0.0'" "$PLIST" || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion '1.0.0'" "$PLIST" || true
            /usr/libexec/PlistBuddy -c "Set :LSMinimumSystemVersion '10.15'" "$PLIST" || true
          fi

      - name: Ad-hoc sign VST3 bundle
        run: |
          BUNDLE="BronzeNoise/build-mac/Products/BronzeNoise.vst3"
          BINARY="$BUNDLE/Contents/MacOS/BronzeNoise"
          if [ -d "$BUNDLE" ] && [ -f "$BINARY" ]; then
            codesign --force --sign - "$BINARY"
            codesign --force --sign - "$BUNDLE"
            codesign -vvv "$BUNDLE" || echo "Warning: signature verification had issues"
          else
            echo "ERROR: bundle or binary missing -- $BUNDLE / $BINARY"
            exit 1
          fi

      - name: Verify macOS VST3 bundle
        run: |
          VST3="BronzeNoise/build-mac/Products/BronzeNoise.vst3"
          VST3_BIN="$VST3/Contents/MacOS/BronzeNoise"
          ERRORS=0
          error() { echo "ERROR: $1"; ERRORS=$((ERRORS + 1)); }

          test -d "$VST3" || error "VST3 bundle missing"
          test -d "$VST3/Contents" || error "Contents/ missing"
          test -d "$VST3/Contents/MacOS" || error "Contents/MacOS/ missing"
          test -f "$VST3/Contents/Info.plist" || error "Contents/Info.plist missing"
          test -x "$VST3_BIN" || error "Binary missing or not executable"

          if file "$VST3_BIN" | grep -q "Mach-O universal binary"; then
            echo "Mach-O universal: OK"
          else
            error "Not a Mach-O universal binary"
          fi

          LIPO_OUT=$(lipo -info "$VST3_BIN" 2>&1)
          echo "$LIPO_OUT"
          echo "$LIPO_OUT" | grep -q "x86_64" || error "Missing x86_64"
          echo "$LIPO_OUT" | grep -q "arm64"  || error "Missing arm64"

          SIZE=$(du -sk "$VST3" | awk '{print $1}')
          echo "Bundle size: ${SIZE}KB"
          if [ "$SIZE" -lt 500 ]; then
            error "Bundle suspiciously small (${SIZE}KB)"
          fi

          PLIST="$VST3/Contents/Info.plist"
          plutil -lint "$PLIST" >/dev/null || error "Invalid plist syntax"

          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$PLIST" 2>/dev/null || echo "")
          BUNDLE_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleName" "$PLIST" 2>/dev/null || echo "")
          BUNDLE_VER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST" 2>/dev/null || echo "")

          [ "$BUNDLE_ID" = "com.cloph-dsp.BronzeNoise" ] || error "CFBundleIdentifier mismatch: $BUNDLE_ID"
          [ "$BUNDLE_NAME" = "BronzeNoise" ]              || error "CFBundleName mismatch: $BUNDLE_NAME"
          [ "$BUNDLE_VER" = "1.0.0" ]                     || error "CFBundleShortVersionString mismatch: $BUNDLE_VER"

          if grep -qi "IPlugEffect\|Acme Inc\|Acme" "$PLIST"; then
            error "Info.plist still contains template values"
          fi

          # Binary-string hygiene: scan compiled Mach-O for stale iPlug2 templates.
          BAD=$(strings "$VST3_BIN" | grep -ciE "AcmeInc|com\.AcmeInc" || true)
          if [ "$BAD" -gt 0 ]; then
            error "Found $BAD template string(s) in VST3 binary (AcmeInc residue)"
          fi

          if [ "$ERRORS" -ne 0 ]; then
            echo "VERIFICATION FAILED: $ERRORS error(s)"
            exit 1
          fi
          echo "VERIFICATION PASSED"

      - name: VST3 binary load tests
        if: always()
        run: |
          VST3_BIN="BronzeNoise/build-mac/Products/BronzeNoise.vst3/Contents/MacOS/BronzeNoise"
          ERRORS=0
          error() { echo "FAIL: $1"; ERRORS=$((ERRORS + 1)); }

          EXPORTS=$(nm -gU "$VST3_BIN" 2>&1)
          echo "$EXPORTS" | grep -q "GetPluginFactory" || error "GetPluginFactory not exported"
          echo "  GetPluginFactory: FOUND"

          cat > /tmp/vst3_loader.c << 'CEOF'
          #include <dlfcn.h>
          #include <stdio.h>
          #include <stdlib.h>
          int main(int argc, char** argv) {
              if (argc < 2) return 1;
              char* resolved = realpath(argv[1], NULL);
              if (!resolved) { fprintf(stderr, "realpath FAILED\n"); return 1; }
              void* handle = dlopen(resolved, RTLD_NOW | RTLD_LOCAL);
              if (!handle) { fprintf(stderr, "dlopen FAILED: %s\n", dlerror()); free(resolved); return 1; }
              void* factory = dlsym(handle, "GetPluginFactory");
              printf("  dlopen:          SUCCESS\n");
              if (factory) printf("  GetPluginFactory: %p\n", factory);
              dlclose(handle);
              free(resolved);
              return 0;
          }
          CEOF

          clang -o /tmp/vst3_loader /tmp/vst3_loader.c -framework CoreFoundation 2>&1 || {
            echo "  WARNING: Could not compile VST3 loader (clang unavailable?)"
            exit 0
          }

          if /tmp/vst3_loader "$VST3_BIN"; then
            echo "  BronzeNoise.vst3: LOAD OK"
          else
            error "BronzeNoise.vst3 binary failed dlopen load test"
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo "LOAD TESTS FAILED: $ERRORS error(s)"
            exit 1
          fi
          echo "ALL LOAD TESTS PASSED"

      - name: Run VST3 SDK official validator (Steinberg compliance)
        if: always()
        run: |
          # Build Steinberg's official vst3_validator from the iPlug2-vendored
          # VST3 SDK; then run it on the built bundle. Matches the Tuner CI
          # convention so a Steinberg-grade validator approves the binary before
          # shipping.
          VST3_BUNDLE="BronzeNoise/build-mac/Products/BronzeNoise.vst3"
          if [ ! -d "$VST3_BUNDLE" ]; then echo "SKIP: VST3 bundle missing"; exit 0; fi

          pushd iPlug2/Dependencies/IPlug > /dev/null
          bash download-vst3-sdk.sh master build-validator 2>&1 > /tmp/vst3_build.log || true
          tail -5 /tmp/vst3_build.log
          popd > /dev/null

          VALIDATOR=$(find iPlug2/Dependencies/IPlug -name "vst3_validator" -type f 2>/dev/null | head -1)
          if [ -z "$VALIDATOR" ]; then
            echo "WARNING: vst3_validator binary not produced -- skipping official validation"
            exit 0
          fi
          cp "$VALIDATOR" /tmp/vst3_validator
          chmod +x /tmp/vst3_validator

          echo "Running Steinberg vst3_validator on $VST3_BUNDLE..."
          /tmp/vst3_validator "$VST3_BUNDLE" 2>&1
          if [ $? -eq 0 ]; then echo "VST3 VALIDATOR: PASSED"
          else echo "VST3 VALIDATOR: FAILED"; exit 1
          fi

      - name: Strip quarantine xattrs VST3
        if: always()
        run: |
          BUNDLE="BronzeNoise/build-mac/Products/BronzeNoise.vst3"
          if [ -d "$BUNDLE" ]; then
            xattr -rc "$BUNDLE" 2>/dev/null || true
          fi

      - name: Stage VST3 artifact
        if: always()
        run: |
          STAGE="BronzeNoise/build-mac/stage-vst3"
          mkdir -p "$STAGE"
          cp -R "BronzeNoise/build-mac/Products/BronzeNoise.vst3" "$STAGE/"

      - name: Upload VST3 artifact (macOS)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BronzeNoise-macOS-VST3
          path: BronzeNoise/build-mac/stage-vst3/
          if-no-files-found: error

      # -----------------------------------------------------------------------
      # CLAP build -- same xcodeproj, different scheme
      # -----------------------------------------------------------------------
      - name: Build CLAP
        run: |
          cd iPlug2/Examples/IPlugEffect
          xcodebuild -project projects/IPlugEffect-macOS.xcodeproj \
            -scheme "macOS-CLAP" \
            -configuration Release \
            -arch x86_64 -arch arm64 \
            CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="-" \
            BUILD_DIR="${{ github.workspace }}/BronzeNoise/build-mac" \
            CLAP_PATH="${{ github.workspace }}/BronzeNoise/build-mac/Products"

      - name: Fix CLAP Info.plist
        run: |
          CLAP="BronzeNoise/build-mac/Products/BronzeNoise.clap"
          PLIST="$CLAP/Contents/Info.plist"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable BronzeNoise" "$PLIST" || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleName BronzeNoise" "$PLIST" || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.cloph-dsp.clap.BronzeNoise" "$PLIST" || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleGetInfoString 'BronzeNoise v1.0.0 Copyright 2026 CLOPH'" "$PLIST" || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleSignature 'Bnz1'" "$PLIST" || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString '1.0.0'" "$PLIST" || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion '1.0.0'" "$PLIST" || true
            /usr/libexec/PlistBuddy -c "Set :LSMinimumSystemVersion '10.15'" "$PLIST" || true
          fi

      - name: Ad-hoc sign CLAP bundle
        run: |
          BUNDLE="BronzeNoise/build-mac/Products/BronzeNoise.clap"
          BINARY="$BUNDLE/Contents/MacOS/BronzeNoise"
          if [ -d "$BUNDLE" ] && [ -f "$BINARY" ]; then
            codesign --force --sign - "$BINARY"
            codesign --force --sign - "$BUNDLE"
            codesign -vvv "$BUNDLE" || echo "Warning: signature verification had issues"
          else
            echo "WARNING: CLAP bundle or binary missing -- $BUNDLE / $BINARY"
          fi

      - name: Verify macOS CLAP bundle
        if: always()
        run: |
          CLAP="BronzeNoise/build-mac/Products/BronzeNoise.clap"
          CLAP_BIN="$CLAP/Contents/MacOS/BronzeNoise"
          ERRORS=0
          error() { echo "ERROR: $1"; ERRORS=$((ERRORS + 1)); }

          test -d "$CLAP" || error "CLAP bundle missing"
          test -d "$CLAP/Contents" || error "Contents/ missing"
          test -d "$CLAP/Contents/MacOS" || error "Contents/MacOS/ missing"
          test -f "$CLAP/Contents/Info.plist" || error "Contents/Info.plist missing"
          test -x "$CLAP_BIN" || error "Binary missing or not executable"

          if file "$CLAP_BIN" | grep -q "Mach-O universal binary"; then
            echo "Mach-O universal: OK"
          else
            error "Not a Mach-O universal binary"
          fi
          LIPO_OUT=$(lipo -info "$CLAP_BIN" 2>&1)
          echo "$LIPO_OUT"
          echo "$LIPO_OUT" | grep -q "x86_64" || error "Missing x86_64"
          echo "$LIPO_OUT" | grep -q "arm64"  || error "Missing arm64"

          PLIST="$CLAP/Contents/Info.plist"
          plutil -lint "$PLIST" >/dev/null || error "Invalid plist syntax"
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$PLIST" 2>/dev/null || echo "")
          [ "$BUNDLE_ID" = "com.cloph-dsp.clap.BronzeNoise" ] || error "CFBundleIdentifier mismatch: $BUNDLE_ID"

          if grep -qi "IPlugEffect\|Acme Inc\|Acme" "$PLIST"; then
            error "Info.plist still contains template values"
          fi

          if [ "$ERRORS" -ne 0 ]; then
            echo "CLAP VERIFICATION FAILED: $ERRORS error(s)"
            exit 1
          fi
          echo "CLAP VERIFICATION PASSED"

      - name: CLAP binary load test
        if: always()
        run: |
          CLAP_BIN="BronzeNoise/build-mac/Products/BronzeNoise.clap/Contents/MacOS/BronzeNoise"
          if [ ! -f "$CLAP_BIN" ]; then echo "SKIP: CLAP binary not present"; exit 0; fi
          EXPORTS=$(nm -gU "$CLAP_BIN" 2>&1)
          echo "$EXPORTS" | grep -q "clap_entry" || { echo "FAIL: clap_entry not exported"; exit 1; }
          echo "  clap_entry: FOUND"

      - name: Strip CLAP quarantine xattrs
        if: always()
        run: |
          BUNDLE="BronzeNoise/build-mac/Products/BronzeNoise.clap"
          if [ -d "$BUNDLE" ]; then xattr -rc "$BUNDLE" 2>/dev/null || true; fi

      - name: Stage CLAP artifact
        if: always()
        run: |
          STAGE="BronzeNoise/build-mac/stage-clap"
          mkdir -p "$STAGE"
          if [ -d "BronzeNoise/build-mac/Products/BronzeNoise.clap" ]; then
            cp -R "BronzeNoise/build-mac/Products/BronzeNoise.clap" "$STAGE/"
          fi

      - name: Upload CLAP artifact (macOS)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BronzeNoise-macOS-CLAP
          path: BronzeNoise/build-mac/stage-clap/
          if-no-files-found: warn

      # -----------------------------------------------------------------------
      # AUv2 build -- macOS-only native format
      # -----------------------------------------------------------------------
      - name: Build AUv2
        run: |
          cd iPlug2/Examples/IPlugEffect
          xcodebuild -project projects/IPlugEffect-macOS.xcodeproj \
            -scheme "macOS-AUv2" \
            -configuration Release \
            -arch x86_64 -arch arm64 \
            CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" \
            BUILD_DIR="${{ github.workspace }}/BronzeNoise/build-mac" \
            AU_PATH="${{ github.workspace }}/BronzeNoise/build-mac/Products"

      - name: Fix AU Info.plist
        run: |
          AU="BronzeNoise/build-mac/Products/BronzeNoise.component"
          PLIST="$AU/Contents/Info.plist"
          if [ ! -f "$PLIST" ]; then echo "SKIP: AU not built"; exit 0; fi
          /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable BronzeNoise" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleName BronzeNoise" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.cloph-dsp.audiounit.BronzeNoise" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleGetInfoString 'BronzeNoise v1.0.0 Copyright 2026 CLOPH'" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleSignature 'Bnz1'" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString '1.0.0'" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion '1.0.0'" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Set :LSMinimumSystemVersion '10.15'" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Set :AudioComponents:0:type aufx" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Set :AudioComponents:0:subtype Bnz1" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Set :AudioComponents:0:manufacturer Clph" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Set :AudioComponents:0:factoryFunction BronzeNoise_Factory" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Set :AudioComponents:0:name 'CLOPH: BronzeNoise'" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Set :AudioComponents:0:description 'Spectral noise matching EQ with target curves'" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Set 'AudioUnit Version' '0x00010000'" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Set :NSPrincipalClass BronzeNoise_View" "$PLIST" || true

      - name: Ad-hoc sign AU bundle
        run: |
          BUNDLE="BronzeNoise/build-mac/Products/BronzeNoise.component"
          BINARY="$BUNDLE/Contents/MacOS/BronzeNoise"
          if [ -d "$BUNDLE" ] && [ -f "$BINARY" ]; then
            codesign --force --sign - "$BINARY"
            codesign --force --sign - "$BUNDLE"
            codesign -vvv "$BUNDLE" || echo "Warning: signature verification had issues"
          else
            echo "WARNING: AU bundle or binary missing -- $BUNDLE / $BINARY"
          fi

      - name: Verify macOS AU bundle
        if: always()
        run: |
          AU="BronzeNoise/build-mac/Products/BronzeNoise.component"
          if [ ! -d "$AU" ]; then echo "SKIP: AU not built"; exit 0; fi
          AU_BIN="$AU/Contents/MacOS/BronzeNoise"
          ERRORS=0
          error() { echo "ERROR: $1"; ERRORS=$((ERRORS + 1)); }

          test -d "$AU/Contents" || error "Contents/ missing"
          test -d "$AU/Contents/MacOS" || error "Contents/MacOS/ missing"
          test -f "$AU/Contents/Info.plist" || error "Info.plist missing"
          test -x "$AU_BIN" || error "Binary missing or not executable"

          if file "$AU_BIN" | grep -q "Mach-O universal binary"; then
            echo "Mach-O universal: OK"
          else
            error "Not a Mach-O universal binary"
          fi
          LIPO_OUT=$(lipo -info "$AU_BIN" 2>&1)
          echo "$LIPO_OUT"
          echo "$LIPO_OUT" | grep -q "x86_64" || error "Missing x86_64"
          echo "$LIPO_OUT" | grep -q "arm64"  || error "Missing arm64"

          PLIST="$AU/Contents/Info.plist"
          plutil -lint "$PLIST" >/dev/null || error "Invalid plist syntax"
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$PLIST" 2>/dev/null || echo "")
          [ "$BUNDLE_ID" = "com.cloph-dsp.audiounit.BronzeNoise" ] || error "CFBundleIdentifier mismatch: $BUNDLE_ID"
          AC_TYPE=$(/usr/libexec/PlistBuddy -c "Print :AudioComponents:0:type" "$PLIST" 2>/dev/null || echo "")
          AC_SUBTYPE=$(/usr/libexec/PlistBuddy -c "Print :AudioComponents:0:subtype" "$PLIST" 2>/dev/null || echo "")
          AC_MFR=$(/usr/libexec/PlistBuddy -c "Print :AudioComponents:0:manufacturer" "$PLIST" 2>/dev/null || echo "")
          [ "$AC_TYPE" = "aufx" ] || error "AudioComponents:0:type != aufx (got $AC_TYPE)"
          [ "$AC_SUBTYPE" = "Bnz1" ] || error "AudioComponents:0:subtype != Bnz1 (got $AC_SUBTYPE)"
          [ "$AC_MFR" = "Clph" ] || error "AudioComponents:0:manufacturer != Clph (got $AC_MFR)"

          if grep -qi "IPlugEffect\|Acme Inc\|Acme" "$PLIST"; then
            error "Info.plist still contains template values"
          fi

          if [ "$ERRORS" -ne 0 ]; then
            echo "AU VERIFICATION FAILED: $ERRORS error(s)"
            exit 1
          fi
          echo "AU VERIFICATION PASSED"

      - name: AU binary load test
        if: always()
        run: |
          AU_BIN="BronzeNoise/build-mac/Products/BronzeNoise.component/Contents/MacOS/BronzeNoise"
          if [ ! -f "$AU_BIN" ]; then echo "SKIP: AU binary not present"; exit 0; fi
          EXPORTS=$(nm -gU "$AU_BIN" 2>&1)
          echo "$EXPORTS" | grep -q "BronzeNoise_Factory" || {
            echo "WARN: BronzeNoise_Factory symbol not exported by name (AUV2_FACTORY may be inlined)"
          }

      - name: Strip AU quarantine xattrs
        if: always()
        run: |
          BUNDLE="BronzeNoise/build-mac/Products/BronzeNoise.component"
          if [ -d "$BUNDLE" ]; then xattr -rc "$BUNDLE" 2>/dev/null || true; fi

      - name: Stage AU artifact
        if: always()
        run: |
          STAGE="BronzeNoise/build-mac/stage-au"
          mkdir -p "$STAGE"
          if [ -d "BronzeNoise/build-mac/Products/BronzeNoise.component" ]; then
            cp -R "BronzeNoise/build-mac/Products/BronzeNoise.component" "$STAGE/"
          fi

      - name: Upload AU artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BronzeNoise-macOS-AU
          path: BronzeNoise/build-mac/stage-au/
          if-no-files-found: warn
