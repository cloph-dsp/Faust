version: 2.1

jobs:
  build-macos-vst3:
    macos:
      xcode: "16.2.0"
    resource_class: m4pro.medium

    environment:
      BINARY_NAME: Freeze95

    steps:
      - checkout

      - run:
          name: Install cmake
          command: brew install cmake

      - run:
          name: Clone iPlug2 framework
          command: git clone --depth 1 --shallow-submodules https://github.com/iPlug2/iPlug2.git Freeze95/iPlug2

      - run:
          name: Download VST3 and CLAP SDKs
          working_directory: Freeze95/iPlug2/Dependencies/IPlug
          command: bash download-iplug-sdks.sh

      - run:
          name: Copy Freeze95 sources over IPlugEffect template
          working_directory: Freeze95
          command: |
            cp Freeze95.cpp iPlug2/Examples/IPlugEffect/IPlugEffect.cpp
            cp Freeze95.h iPlug2/Examples/IPlugEffect/IPlugEffect.h
            cp Freeze95.h iPlug2/Examples/IPlugEffect/Freeze95.h
            cp config.h iPlug2/Examples/IPlugEffect/config.h
            cp Freeze95DSP.h iPlug2/Examples/IPlugEffect/Freeze95DSP.h
            cp resources/* iPlug2/Examples/IPlugEffect/resources/ 2>/dev/null || true
            cd iPlug2/Examples/IPlugEffect/resources
            for f in IPlugEffect-*.plist; do
              [ -f "$f" ] && cp "$f" "Freeze95${f#IPlugEffect}" || true
            done

      - run:
          name: Write xcconfig override
          command: |
            cat > Freeze95/iPlug2/Examples/IPlugEffect/config/IPlugEffect-mac.xcconfig << 'XCCONFIG'
            IPLUG2_ROOT = ../../..
            #include "../../../common-mac.xcconfig"
            BINARY_NAME = Freeze95
            EXTRA_INC_PATHS = $(IGRAPHICS_INC_PATHS) $(SRCROOT)/../../../..
            EXTRA_ALL_DEFS = IGRAPHICS_NANOVG IGRAPHICS_METAL
            EXTRA_LNK_FLAGS = -framework Metal -framework MetalKit
            ARCHS = x86_64 arm64
            RELEASE_OPTIMIZE = 3
            MACOSX_DEPLOYMENT_TARGET = 11.0
            CODE_SIGNING_REQUIRED = YES
            CODE_SIGN_IDENTITY = -
            // macOS 15+ ad-hoc cannot embed entitlements - skip hardened runtime
            XCCONFIG

      - run:
          name: Build VST3
          working_directory: Freeze95/iPlug2/Examples/IPlugEffect
          command: |
            xcodebuild -project projects/IPlugEffect-macOS.xcodeproj \
              -scheme "macOS-VST3" \
              -configuration Release \
              -arch x86_64 -arch arm64 \
              BUILD_DIR="${CIRCLE_WORKING_DIRECTORY}/Freeze95/build-mac" \
              VST3_PATH="${CIRCLE_WORKING_DIRECTORY}/Freeze95/build-mac/Products"

      - run:
          name: Verify VST3 bundle
          command: |
            VST3="${CIRCLE_WORKING_DIRECTORY}/Freeze95/build-mac/Products/Freeze95.vst3"
            echo "=== VST3 Bundle Verification ==="
            if [ -d "$VST3" ]; then
              echo "Bundle found: $VST3"
              ls -la "$VST3/Contents/"
              ls -la "$VST3/Contents/MacOS/" || echo "MacOS dir missing"
              file "$VST3/Contents/MacOS/Freeze95"
              lipo -info "$VST3/Contents/MacOS/Freeze95"
            else
              echo "ERROR: VST3 bundle not found!"
              ls -la "${CIRCLE_WORKING_DIRECTORY}/Freeze95/build-mac/Products/" || echo "Products dir missing"
              exit 1
            fi

      - run:
          name: Fix Info.plist
          command: |
            PLIST="${CIRCLE_WORKING_DIRECTORY}/Freeze95/build-mac/Products/Freeze95.vst3/Contents/Info.plist"
            /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable Freeze95" "$PLIST" || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleName Freeze95" "$PLIST" || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.cloph.Freeze95" "$PLIST" || true

      - run:
          name: Codesign ad-hoc (no hardened runtime, macOS 15+)
          command: |
            VST3="${CIRCLE_WORKING_DIRECTORY}/Freeze95/build-mac/Products/Freeze95.vst3"
            BIN="$VST3/Contents/MacOS/Freeze95"
            if [ -f "$BIN" ]; then
              codesign --force -s - "$BIN"
              codesign --force -s - "$VST3"
              codesign -dvv "$VST3" 2>&1
            fi

      - run:
          name: Package VST3 artifact
          command: |
            cd "${CIRCLE_WORKING_DIRECTORY}/Freeze95/build-mac/Products"
            if [ -d "Freeze95.vst3" ]; then
              rm -f Freeze95-macOS-VST3.zip
              zip -r Freeze95-macOS-VST3.zip Freeze95.vst3/
              ls -lh Freeze95-macOS-VST3.zip
            fi

      - store_artifacts:
          path: Freeze95/build-mac/Products/Freeze95-macOS-VST3.zip
          destination: Freeze95-macOS-VST3

workflows:
  version: 2
  build:
    jobs:
      - build-macos-vst3
